let workOpen = false;
const workEl    = document.getElementById('work');
const workInner = document.getElementById('work-inner');

function buildWork() {
  workInner.innerHTML = '';
  _focusedRow = null;  // old DOM is gone — clear stale reference
  const n = projectData.length;
  if (n === 0) return;
  // Each row height = viewport / projectCount so one block = one viewport.
  // Minimum 140px so even with many projects rows stay usable.
  const rowH = Math.max(140, window.innerHeight / n);
  workInner.style.setProperty('--row-h', rowH + 'px');
  // Build many copies for a smoother infinite scroll illusion.
  // With enough copies, typical scroll sessions never hit the edges where snap happens.
  const copies = isTouch ? 21 : 9;
  workInner.dataset.copies = copies;
  workInner.dataset.middle = Math.floor(copies / 2); // middle block index
  for (let rep = 0; rep < copies; rep++) {
    projectData.forEach((p, i) => {
      const pd     = projectDetails[i];
      const frames = pd?.thumbFrames || [];
      const sc     = pd?.sliceCount  || 20;

      const row = document.createElement('div');
      row.className = 'work-row';
      row.dataset.projectIdx = i;
      row.dataset.rep = rep;

      const bg = document.createElement('div');
      bg.className = 'work-bg';

      const picked = Array.from({length: sc}, (_, j) => {
        if (!frames.length) return null;
        const idx = sc === 1 ? 0 : Math.round(j * (frames.length - 1) / (sc - 1));
        return frames[Math.min(idx, frames.length - 1)];
      });
      picked.forEach(src => {
        const s = document.createElement('div');
        s.className = 'work-slice';
        if (src) s.style.backgroundImage = `url('${src}')`;
        bg.appendChild(s);
      });

      const studio = (p.studio && p.studio !== 'x') ? p.studio + ' — ' : '';
      const client = (p.client && p.client !== 'x') ? ` — ${p.client}` : '';
      const title  = `${p.name}${client}`;
      const overlay = document.createElement('div');
      overlay.className = 'work-overlay';
      overlay.innerHTML = `
        <div>
          <div class="work-title">${title}</div>
          <div class="work-sub">${studio}${p.type}</div>
        </div>`;

      row.appendChild(bg);
      row.appendChild(overlay);
      row.addEventListener('click', () => { closeWork(true); goTo(i); openDetail(); });
      workInner.appendChild(row);
    });
  }
}

// Returns the rows belonging to the middle block — used by FLIP animations
// so the flying thumbs land on the visible, normally-scrolled copies.
function middleWorkRows() {
  const middle = workInner.dataset.middle || '2';
  return Array.from(workInner.querySelectorAll(`.work-row[data-rep="${middle}"]`));
}

// Infinite scroll wiring: set up once when work opens
function setupInfiniteWorkScroll() {
  workEl.onscroll = null;
  if (workEl._scrollEndTimer) clearTimeout(workEl._scrollEndTimer);

  requestAnimationFrame(() => {
    const n = projectData.length;
    if (n === 0) return;
    const rows = Array.from(workInner.querySelectorAll('.work-row'));
    const copies = parseInt(workInner.dataset.copies) || 5;
    if (rows.length < n * copies || !rows[n] || !rows[0]) return;

    const blockHeight = rows[n].offsetTop - rows[0].offsetTop;
    if (blockHeight <= 0) return;

    const middle = parseInt(workInner.dataset.middle) || 2;
    workEl.scrollTop = blockHeight * middle;

    // Initialize year indicator with the project currently at viewport center.
    // The scroll handlers below will update it smoothly as the user scrolls.
    initWorkYearForCenter();

    if (isTouch) {
      // ── MOBILE: debounced snap after scroll settles ──
      // iOS momentum is fragile — any scrollTop change mid-scroll cancels it.
      // Wait until user has stopped scrolling for 150ms, then reposition.
      const topThreshold    = blockHeight * 2;
      const bottomThreshold = blockHeight * (copies - 3);

      let snapping = false;
      const checkAndSnap = () => {
        if (snapping) return;
        const st = workEl.scrollTop;
        if (st < topThreshold) {
          snapping = true;
          const offsetInBlock = st % blockHeight;
          workEl.scrollTop = blockHeight * middle + offsetInBlock;
          requestAnimationFrame(() => { snapping = false; });
        }
        else if (st > bottomThreshold) {
          snapping = true;
          const offsetInBlock = st % blockHeight;
          workEl.scrollTop = blockHeight * middle + offsetInBlock;
          requestAnimationFrame(() => { snapping = false; });
        }
      };
      workEl.onscroll = () => {
        updateWorkYearOnScroll();
        if (workEl._scrollEndTimer) clearTimeout(workEl._scrollEndTimer);
        workEl._scrollEndTimer = setTimeout(checkAndSnap, 150);
      };
    } else {
      // ── DESKTOP: snap immediately when deep in edge copies ──
      // Desktop wheel/trackpad scroll doesn't have iOS-style momentum, and
      // inline `scrollTop =` works seamlessly without breaking scroll velocity.
      // Using small buffer so the snap happens consistently.
      const topThreshold    = blockHeight * 0.8;
      const bottomThreshold = blockHeight * (copies - 1.8);
      const snapAmount      = blockHeight * (copies - 3);

      let snapping = false;
      workEl.onscroll = () => {
        updateWorkYearOnScroll();
        if (snapping) return;
        const st = workEl.scrollTop;
        if (st < topThreshold) {
          snapping = true;
          workEl.scrollTop = st + snapAmount;
          requestAnimationFrame(() => { snapping = false; });
        }
        else if (st > bottomThreshold) {
          snapping = true;
          workEl.scrollTop = st - snapAmount;
          requestAnimationFrame(() => { snapping = false; });
        }
      };
    }
  });
}

// ── YEAR INDICATOR TRACKING + FOCUSED ROW TRACKING ──
// Finds which row is closest to the viewport's vertical center, then:
//  1. Adds `.is-focused` to that row (for Apple-style emphasis)
//  2. Updates the #work-year indicator if the project changed
// Runs on every scroll event, throttled to one rAF.
let _workYearState = { current: null, lastScrollTop: 0 };
let _focusedRow = null;

function getRowAtViewportCenter() {
  const rows = Array.from(workInner.querySelectorAll('.work-row'));
  if (!rows.length) return null;
  const centerY = window.innerHeight / 2;
  let best = null, bestDist = Infinity;
  for (const r of rows) {
    const rect = r.getBoundingClientRect();
    const rowCenter = rect.top + rect.height / 2;
    const dist = Math.abs(rowCenter - centerY);
    if (dist < bestDist) { bestDist = dist; best = r; }
  }
  return best;
}

function getProjectIdxAtViewportCenter() {
  const row = getRowAtViewportCenter();
  return row ? parseInt(row.dataset.projectIdx) : null;
}

function updateFocusedRow() {
  const row = getRowAtViewportCenter();
  if (!row || row === _focusedRow) return;
  if (_focusedRow) _focusedRow.classList.remove('is-focused');
  row.classList.add('is-focused');
  _focusedRow = row;
}

function initWorkYearForCenter() {
  const yearEl = document.getElementById('work-year');
  if (!yearEl) return;
  updateFocusedRow();  // set initial focused row immediately
  const idx = getProjectIdxAtViewportCenter();
  if (idx == null) return;
  const year = projectData[idx]?.year || '';
  yearEl.classList.add('no-anim');
  yearEl.classList.remove('is-changing-forward', 'is-changing-backward');
  const cur = yearEl.querySelector('.wy-current');
  const inc = yearEl.querySelector('.wy-incoming');
  cur.textContent = year;
  inc.textContent = year;
  _workYearState.current = idx;
  _workYearState.lastScrollTop = workEl.scrollTop;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => yearEl.classList.remove('no-anim'));
  });
}

// Throttled via rAF — one check per frame even on fast scroll
let _workYearRaf = null;
function updateWorkYearOnScroll() {
  if (_workYearRaf) return;
  _workYearRaf = requestAnimationFrame(() => {
    _workYearRaf = null;
    updateFocusedRow();
    const yearEl = document.getElementById('work-year');
    if (!yearEl) return;
    const idx = getProjectIdxAtViewportCenter();
    if (idx == null) return;
    if (idx === _workYearState.current) {
      _workYearState.lastScrollTop = workEl.scrollTop;
      return;
    }
    const direction = workEl.scrollTop > _workYearState.lastScrollTop ? 'forward' : 'backward';
    _workYearState.lastScrollTop = workEl.scrollTop;
    changeWorkYear(idx, direction);
  });
}

function changeWorkYear(newIdx, direction) {
  const yearEl = document.getElementById('work-year');
  if (!yearEl) return;
  const year = projectData[newIdx]?.year || '';
  const cur = yearEl.querySelector('.wy-current');
  const inc = yearEl.querySelector('.wy-incoming');
  if (!cur || !inc) return;
  // If a transition is still mid-flight, snap it to final state before starting next
  if (yearEl.classList.contains('is-changing-forward') ||
      yearEl.classList.contains('is-changing-backward')) {
    yearEl.classList.add('no-anim');
    cur.textContent = inc.textContent;
    yearEl.classList.remove('is-changing-forward', 'is-changing-backward');
    requestAnimationFrame(() => yearEl.classList.remove('no-anim'));
  }
  // Position the incoming slot on the correct side based on direction
  inc.textContent = year;
  // Reset incoming's pre-animation position based on direction
  yearEl.classList.add('no-anim');
  if (direction === 'forward') {
    // Incoming comes from below
    inc.style.transform = 'translateY(40%)';
  } else {
    // Incoming comes from above
    inc.style.transform = 'translateY(-40%)';
  }
  inc.style.opacity = '0';
  inc.style.filter = 'blur(6px)';
  // Next frame: remove no-anim, add change class — CSS transitions kick in
  requestAnimationFrame(() => {
    yearEl.classList.remove('no-anim');
    requestAnimationFrame(() => {
      inc.style.transform = '';  // cleared; CSS class rules take over
      inc.style.opacity = '';
      inc.style.filter = '';
      yearEl.classList.add(`is-changing-${direction}`);
    });
  });
  // After the transition finishes, swap: current ← incoming, reset incoming
  setTimeout(() => {
    yearEl.classList.add('no-anim');
    yearEl.classList.remove('is-changing-forward', 'is-changing-backward');
    cur.textContent = year;
    requestAnimationFrame(() => yearEl.classList.remove('no-anim'));
  }, 580);
  _workYearState.current = newIdx;
}

function createFlyThumb(startRect, endRect, frames, sc, fallbackTc) {
  const fly = document.createElement('div');
  fly.className = 'fly-thumb';
  fly.style.left   = startRect.left + 'px';
  fly.style.top    = startRect.top  + 'px';
  fly.style.width  = startRect.width  + 'px';
  fly.style.height = startRect.height + 'px';

  const bg = document.createElement('div');
  bg.className = 'fly-bg';
  const picked = Array.from({length: sc}, (_, j) => {
    if (!frames.length) return null;
    const idx = sc === 1 ? 0 : Math.round(j * (frames.length - 1) / (sc - 1));
    return frames[Math.min(idx, frames.length - 1)];
  });
  picked.forEach(src => {
    const s = document.createElement('div');
    s.className = 'fly-slice';
    if (src) s.style.backgroundImage = `url('${src}')`;
    bg.appendChild(s);
  });
  fly.appendChild(bg);
  document.body.appendChild(fly);

  // Force reflow, then animate to end position
  fly.getBoundingClientRect();
  requestAnimationFrame(() => {
    fly.style.transform = `translate(${endRect.left - startRect.left}px, ${endRect.top - startRect.top}px)`;
    fly.style.width  = endRect.width  + 'px';
    fly.style.height = endRect.height + 'px';
  });
  return fly;
}

let workWasPlaying = false;

function openWork() {
  if (workOpen || transitioning) return;
  workOpen = true;
  transitioning = true;
  haptic('medium');

  // Pause landing video while on work page
  workWasPlaying = playing;
  setPlaying(false);

  // Hide the mobile play indicator (which shows when paused)
  const ind = mobIndicator;
  if (ind) ind.classList.remove('visible');

  // 1. Measure where each thumbnail is NOW in the strip
  const startRects = allThumbs().map(t => t.getBoundingClientRect());

  // 2. Build the work page (hidden - opacity 0)
  buildWork();
  workEl.style.visibility = 'visible';
  workEl.classList.add('open');

  // Scroll to the middle block before measuring — flights will land on visible rows
  const allRows = Array.from(workInner.querySelectorAll('.work-row'));
  const n = projectData.length;
  const copies = parseInt(workInner.dataset.copies) || 5;
  const middleIdx = parseInt(workInner.dataset.middle) || 2;
  if (n > 0 && allRows.length >= n * copies && allRows[n] && allRows[0]) {
    const blockHeight = allRows[n].offsetTop - allRows[0].offsetTop;
    if (blockHeight > 0) workEl.scrollTop = blockHeight * middleIdx;
  }

  // 3. Measure where each row WILL BE in the work page — use middle block
  const rows = middleWorkRows();
  const endRects = rows.map(r => r.getBoundingClientRect());

  // 4. Hide the landing strip (instant, no slide animation) and work rows
  stripEl.style.visibility = 'hidden';
  metaEl.classList.add('hide');
  hintEl.classList.add('hide');
  allRows.forEach(r => r.style.visibility = 'hidden');

  // 5. Create flying clones that animate from startRect to endRect
  const flies = projectData.map((p, i) => {
    const pd     = projectDetails[i];
    const frames = pd?.thumbFrames || [];
    const sc     = pd?.sliceCount  || 20;
    return createFlyThumb(startRects[i], endRects[i], frames, sc, p.tc);
  });

  // 6. Once animation finishes, show the real rows and remove clones
  setTimeout(() => {
    allRows.forEach(r => r.style.visibility = '');
    flies.forEach(f => f.remove());
    transitioning = false;
    // Wire up the infinite scroll after everything is visible
    setupInfiniteWorkScroll();
  }, 750);
}

function closeWork(skipAnim = false) {
  if (!workOpen || transitioning) return;
  workOpen = false;
  transitioning = true;

  // Disable infinite scroll listener
  workEl.onscroll = null;

  // Resume landing video if it was playing before
  if (workWasPlaying) setPlaying(true);

  // If we're going straight to detail, skip the FLIP animation — just fade out cleanly
  // openDetail() will manage the `transitioning` flag itself
  if (skipAnim) {
    workEl.classList.remove('open');
    stripEl.style.visibility = '';
    return;
  }

  // Determine if user has scrolled far from the middle block — if so, the FLIP
  // animation would cross the screen awkwardly. In that case, use a simple
  // fade-out + strip-slides-up-from-bottom animation instead.
  const n = projectData.length;
  const copies = parseInt(workInner.dataset.copies) || 5;
  const middleIdx = parseInt(workInner.dataset.middle) || 2;
  const rows0 = Array.from(workInner.querySelectorAll('.work-row'));
  const blockHeight = (rows0.length >= n * copies && rows0[n] && rows0[0])
    ? rows0[n].offsetTop - rows0[0].offsetTop
    : 0;
  const middleOffset = blockHeight * middleIdx;
  const scrolledAway = blockHeight > 0 && Math.abs(workEl.scrollTop - middleOffset) > blockHeight * 0.3;

  if (scrolledAway) {
    // Fade out work page while the strip slides up from the bottom of the landing
    workEl.classList.remove('open');
    metaEl.classList.remove('hide');
    hintEl.classList.remove('hide');
    // Start the strip below the viewport, then animate it up to its final position
    stripEl.style.visibility = '';
    stripEl.classList.add('hide');  // starts translated down
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        stripEl.classList.remove('hide');  // slides up (existing .hide transition handles it)
      });
    });
    setTimeout(() => { transitioning = false; }, 700);
    return;
  }

  // ── FLIP animation (used when rows are near their original position) ──
  // 1. Measure current positions of work rows — from middle block
  const allRows = rows0;
  const rows = middleWorkRows();
  const startRects = rows.map(r => r.getBoundingClientRect());

  // 2. The strip is already at its correct position (just hidden via visibility)
  const endRects = allThumbs().map(t => t.getBoundingClientRect());

  // 3. Hide all work rows so only clones are visible during animation
  allRows.forEach(r => r.style.visibility = 'hidden');

  // 4. Create flying clones from row positions → strip positions
  const flies = projectData.map((p, i) => {
    const pd     = projectDetails[i];
    const frames = pd?.thumbFrames || [];
    const sc     = pd?.sliceCount  || 20;
    return createFlyThumb(startRects[i], endRects[i], frames, sc, p.tc);
  });

  // 5. Fade out work page, restore meta/hint
  workEl.classList.remove('open');
  metaEl.classList.remove('hide');
  hintEl.classList.remove('hide');

  // 6. After animation finishes, restore strip visibility and remove clones
  setTimeout(() => {
    stripEl.style.visibility = '';
    flies.forEach(f => f.remove());
    allRows.forEach(r => r.style.visibility = '');
    transitioning = false;
  }, 750);
}

function openDetail() {
  transitioning = true;
  detailOpen = true;
  haptic('medium');
  fillDetail(cur);

  stripEl.classList.add('hide');
  metaEl.classList.add('hide');
  hintEl.classList.add('hide');

  // Hide mobile play indicator
  const ind = mobIndicator;
  if (ind) ind.classList.remove('visible');

  // pause ticker and landing video
  cancelAnimationFrame(raf);
  if (isLndVideo) {
    lndVideo._savedTime = lndVideo.currentTime;
    lndVideo.pause();
  }

  setTimeout(() => {
    videoBg.classList.add('blurred');
    detailEl.classList.add('open');
    detailEl.scrollTop = 0;
  }, 180);

  setTimeout(() => { transitioning = false; }, 900);
}

function closeDetail() {
  if (!detailOpen || transitioning) return;
  transitioning = true;
  detailOpen = false;

  detailEl.classList.remove('open');
  videoBg.classList.remove('blurred');
  canvasInner.classList.remove('mobile-detail');

  // Resume landing video. On HLS (mobile), segments around _savedTime may have
  // been evicted while detail was open — we need to tell hls.js to reload
  // at that position BEFORE calling play(), otherwise the video plays the
  // last decoded frame briefly then freezes waiting for unloaded data.
  if (isLndVideo && playing) {
    const savedTime = lndVideo._savedTime || 0;
    if (_hlsInstance) {
      try { _hlsInstance.startLoad(savedTime); } catch {}
      lndVideo.currentTime = savedTime;
      // Small settle so hls.js can fetch the segment before we play
      setTimeout(() => {
        lndVideo.play().catch(() => {});
      }, 80);
    } else {
      if (savedTime) lndVideo.currentTime = savedTime;
      lndVideo.play().catch(() => {});
    }
  }
  if (playing) { lastTs = null; schedTick(); }
  // If video was paused, restore the mobile play indicator
  const ind = mobIndicator;
  if (ind && !playing) ind.classList.add('visible');

  // 2. strip comes back up after detail is gone
  setTimeout(() => {
    stripEl.classList.remove('hide');
    metaEl.classList.remove('hide');
    hintEl.classList.remove('hide');
    
    metaEl.classList.remove('visible');
    hintEl.classList.remove('visible');
    setTimeout(() => {
      metaEl.classList.add('visible');
      hintEl.classList.add('visible');
      transitioning = false;
    }, 50);
  }, 500);
}

// Wheel
let wCool = false;
window.addEventListener('wheel', e => {
  if (wCool || workOpen || infoOpen) return;
  wCool = true; setTimeout(() => wCool = false, 900);
  if (!detailOpen && e.deltaY > 15) openDetail();
  else if (detailOpen && e.deltaY < -15) closeDetail();
}, { passive:true });

// Touch — TikTok/Reels style swipe for mobile
let ty0 = 0, tx0 = 0;
let swipeActive = false;
let swipeDy = 0;
const SWIPE_THRESHOLD = 80; // px to commit to a project change

const peekEl = document.getElementById('video-bg-peek');

window.addEventListener('touchstart', e => {
  ty0 = e.touches[0].clientY;
  tx0 = e.touches[0].clientX;
  swipeActive = false;
  swipeDy = 0;
}, { passive:true });

window.addEventListener('touchmove', e => {
  if (workOpen || detailOpen || transitioning || infoOpen) return;
  if (e.target.closest('#strip-area, #scroll-hint, nav')) return;

  const dy = e.touches[0].clientY - ty0;
  const dx = e.touches[0].clientX - tx0;

  if (!swipeActive) {
    if (Math.abs(dy) > 15 && Math.abs(dy) > Math.abs(dx)) {
      swipeActive = true;
      videoBg.classList.add('swiping');
      peekEl.classList.add('swiping');
    } else return;
  }

  if (!isTouch) return;

  swipeDy = dy;
  const h = window.innerHeight;

  // Current video follows finger
  videoBg.style.transform = `translateY(${dy}px)`;

  // Peek of next/prev project sits edge-to-edge with current,
  // so they move together like a film strip
  const isSwipeUp = dy < 0;
  const nextIdx = isSwipeUp ? (cur + 1) % projectData.length
                            : (cur - 1 + projectData.length) % projectData.length;
  const nextThumb = projectDetails[nextIdx]?.thumbFrames?.[0];
  if (nextThumb) peekEl.style.backgroundImage = `url('${nextThumb}')`;

  // Position peek: if swiping up, peek sits below (+h), moves with finger to 0
  // If swiping down, peek sits above (-h), moves with finger to 0
  const peekY = isSwipeUp ? (h + dy) : (-h + dy);
  peekEl.style.transform = `translateY(${peekY}px)`;
  peekEl.classList.add('visible');
}, { passive:true });

window.addEventListener('touchend', e => {
  if (workOpen || infoOpen) return;

  if (swipeActive && isTouch) {
    videoBg.classList.remove('swiping');
    peekEl.classList.remove('swiping');
    const h = window.innerHeight;
    const isSwipeUp = swipeDy < 0;
    const nextIdx = isSwipeUp
      ? (cur + 1) % projectData.length
      : (cur - 1 + projectData.length) % projectData.length;

    // Commit if swiped more than 20% of screen
    if (Math.abs(swipeDy) > h * 0.2) {
      haptic('heavy');  // tactile confirmation of the gesture
      // Slide both all the way off — current moves fully off, peek moves fully in
      videoBg.style.transition = 'transform 0.35s cubic-bezier(0.33,1,0.68,1)';
      peekEl.style.transition  = 'transform 0.35s cubic-bezier(0.33,1,0.68,1)';
      videoBg.style.transform  = `translateY(${isSwipeUp ? -h : h}px)`;
      peekEl.style.transform   = 'translateY(0)';
      setTimeout(() => {
        // Peek is now covering the screen — move video silently to same position
        // so when goTo loads the new video, it's already in place
        videoBg.style.transition = 'none';
        videoBg.style.transform  = '';
        peekEl.style.transition  = 'none';
        // Load the new project (this updates the bg thumbnail poster and starts video)
        goTo(nextIdx);
        // Hide peek on next frame, once video has the new poster set
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            peekEl.classList.remove('visible');
            peekEl.style.transform = '';
          });
        });
        // Briefly highlight the new active thumb on the strip
        flashActiveThumb();
      }, 350);
    } else {
      // Snap back
      videoBg.style.transition = 'transform 0.25s ease-out';
      peekEl.style.transition  = 'transform 0.25s ease-out';
      videoBg.style.transform  = 'translateY(0)';
      peekEl.style.transform   = `translateY(${isSwipeUp ? h : -h}px)`;
      setTimeout(() => {
        videoBg.style.transition = '';
        peekEl.style.transition  = '';
        peekEl.style.transform   = '';
        peekEl.classList.remove('visible');
      }, 250);
    }
    swipeActive = false;
    swipeDy = 0;
    return;
  }

  // Non-swipe: desktop touch behavior
  if (!isTouch) {
    if (e.target.closest('#strip-area')) return;
    const dy = ty0 - e.changedTouches[0].clientY;
    const dx = tx0 - e.changedTouches[0].clientX;
    if (Math.abs(dx) > Math.abs(dy)) return;
    if (!detailOpen && dy > 40) openDetail();
    else if (detailOpen && dy < -40) closeDetail();
  }
}, { passive:true });

// Keys
document.addEventListener('keydown', e => {
  if (infoOpen) {
    if (e.key === 'Escape') closeInfo();
    return;
  }
  if (workOpen) {
    if (e.key === 'Escape') closeWork();
    return;
  }
  if (e.key==='ArrowRight' && !detailOpen) { goTo((cur+1) % projectData.length); flashActiveThumb(); }
  if (e.key==='ArrowLeft'  && !detailOpen) { goTo((cur-1+projectData.length) % projectData.length); flashActiveThumb(); }
  if (e.key==='Escape' && detailOpen) closeDetail();
  if (e.key===' ' && !detailOpen && !infoOpen) {
    e.preventDefault();
    setPlaying(!playing);
  }
});

// ── LANDING VIDEO CONTROLS ──
const lndVideo    = document.getElementById('video-bg-inner');
const lndPlayBtn  = document.getElementById('lnd-play');
const lndPlayIcon = document.getElementById('lnd-play-icon');
const lndMuteBtn  = document.getElementById('lnd-mute');
const lndWaves    = document.getElementById('lnd-waves');
const isLndVideo  = lndVideo && lndVideo.tagName === 'VIDEO';

// Video starts muted — reflect that in the icon
if (lndWaves) lndWaves.style.opacity = '0.15';

lndPlayBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  e.currentTarget.blur();
  if (!isLndVideo) return;
  setPlaying(!playing);
});

// Click landing video:
// - Desktop: go to next project
// - Mobile: toggle play/pause (TikTok style)
videoBg.addEventListener('click', () => {
  if (detailOpen || workOpen || infoOpen) return;
  if (isTouch) {
    setPlaying(!playing);
  } else {
    goTo((cur + 1) % projectData.length);
    flashActiveThumb();
  }
});

lndMuteBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  e.currentTarget.blur();
  if (!isLndVideo) return;
  lndVideo.muted = !lndVideo.muted;
  lndWaves.style.opacity = lndVideo.muted ? '0.15' : '1';
});

// ── NAV YEAR ──
document.getElementById('nav-year').textContent = new Date().getFullYear();

// Fix zoom on orientation change for all mobile browsers including iOS Chrome
function resetViewport() {
  const meta = document.querySelector('meta[name=viewport]');
  meta.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0';
  requestAnimationFrame(() => {
    meta.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, shrink-to-fit=yes';
    setTimeout(() => { if (projectData.length) buildStrip(); }, 200);
  });
}

// Use visualViewport to detect and correct any residual zoom
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const scale = window.visualViewport.scale;
    if (Math.abs(scale - 1) > 0.05) resetViewport();
    scheduleResizeRebuild();
  });
}

// Debounced resize rebuild — prevents thrashing when mobile browser chrome
// shows/hides or during window drags on desktop
let _resizeTimer = null;
function scheduleResizeRebuild() {
  if (_resizeTimer) clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    _resizeTimer = null;
    if (projectData.length) buildStrip();
    if (workOpen) { buildWork(); setupInfiniteWorkScroll(); }
  }, 150);
}
window.addEventListener('orientationchange', resetViewport);
window.addEventListener('resize', scheduleResizeRebuild);

// ── CUSTOM CURSOR ──
const curEl = document.getElementById('cur');
const hoverTargets = 'a, button, .thumb, .win, .win-resize-drag, #scroll-hint span, #scroll-hint .scroll-arrow, .df-values a';

if (!isTouch) {
  document.addEventListener('mousemove', e => {
    curEl.style.left = e.clientX + 'px';
    curEl.style.top  = e.clientY + 'px';
  });

  document.addEventListener('mouseover', e => {
    if (e.target.closest(hoverTargets)) document.body.classList.add('cur-hover');
  });

  document.addEventListener('mouseout', e => {
    if (e.target.closest(hoverTargets)) document.body.classList.remove('cur-hover');
  });
}

// ── INIT ──
window.addEventListener('load', async () => {
  // 1. Load project metadata
  await loadProjects();

  // 2. Preload first video at highest browser priority
  if (projectData[0]?.src) {
    const link = document.createElement('link');
    link.rel = 'preload'; link.as = 'video';
    link.href = projectData[0].src;
    document.head.appendChild(link);
  }

  // 3. Build strip with color fallbacks, start playing
  buildStrip();
  setBg(0); setActiveThumb(0); updateMeta(0); setPlaying(true);

  // Fade the page in once the initial frame is ready
  requestAnimationFrame(() => {
    requestAnimationFrame(() => document.body.classList.add('loaded'));
  });

  // 4. First project thumbnails — await so strip fills in immediately
  const firstPd = projectDetails[0];
  if (!firstPd.thumbFrames?.length) {
    const result = await loadThumbnailFrames(`${ASSETS_BASE}/${projectData[0].folder}`);
    if (result.frames.length > 0) {
      firstPd.thumbFrames = result.frames;
      firstPd.sliceCount  = result.sliceCount;
      buildStrip();
      if (workOpen) { buildWork(); setupInfiniteWorkScroll(); }
    }
  }

  // 5. Remaining thumbnails — all in parallel, non-blocking
  Promise.all(projectData.slice(1).map(async (p, j) => {
    const i  = j + 1;
    const pd = projectDetails[i];
    if (!pd.thumbFrames?.length) {
      const result = await loadThumbnailFrames(`${ASSETS_BASE}/${p.folder}`);
      if (result.frames.length > 0) {
        pd.thumbFrames = result.frames;
        pd.sliceCount  = result.sliceCount;
        buildStrip();
        if (workOpen) { buildWork(); setupInfiniteWorkScroll(); }
      }
    }
  }));

  // 6. Detail images — lowest priority, not visible on landing
  setTimeout(() => {
    projectData.forEach(async (p, i) => {
      const pd = projectDetails[i];
      if (!pd.images?.length) {
        pd.images = await loadImages(`${ASSETS_BASE}/${p.folder}`, pd.imagesHint);
      }
    });
  }, 2000);
});

async function loadThumbnailsInBackground() {} // no longer used
