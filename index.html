* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --strip-h: 100px;
  --pad-b: 14px;
  --dim: rgba(255,255,255,0.38);
}
html, body {
  width:100%; height:100%;
  background:#000;
  color:#fff;
  font-family:'NM',sans-serif;
  font-weight:300;
  overflow:hidden;
  cursor:none;
}
* { cursor:none !important; }

/* ── CUSTOM CURSOR ── */
#cur {
  position:fixed;
  top:0; left:0;
  width:32px; height:32px;
  pointer-events:none;
  z-index:99999;
  transform:translate(-50%,-50%);
  will-change:transform;
}
#cur svg {
  width:100%; height:100%;
  overflow:visible;
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
body.cur-hover #cur svg {
  transform:rotate(45deg);
}

/* ── VIDEO BG — always fixed fullscreen ── */
#video-bg {
  position:fixed;
  inset:0;
  z-index:1;
  transition: filter 0.7s ease, transform 0.7s ease;
}
#video-bg.blurred {
  filter: blur(20px);
  transform: scale(1.06);
}
#video-bg-inner {
  width:100%; height:100%;
}

/* ── NAV — fixed, always on top ── */
nav {
  position:fixed;
  top:0; left:0; right:0;
  z-index:100;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:1.4rem 1.6rem;
  transition: opacity 0.4s, transform 0.5s cubic-bezier(0.76,0,0.24,1);
}
nav.hide {
  opacity:0;
  transform: translateY(-100%);
}
.nav-links { display:flex; gap:2rem; }
.nav-links a {
  font-size:1.23rem;
  color:#fff; text-decoration:none; transition:color 0.2s;
}
.nav-links a:hover { color:#fff; opacity:0.6; }
#nav-year {
  font-size:1.23rem;
  color:#fff;
}
.nav-brand { text-align:center; }
.nav-brand .name {
  font-size:1.23rem; color:#fff;
  display:block; font-weight:500; line-height:1.4;
}
.nav-brand .tagline {
  font-size:1.23rem; color:#fff;
  display:block; margin-top:1px; line-height:1.4;
}

/* ── META — fixed above strip ── */
#meta {
  position:fixed;
  left:1.6rem;
  bottom:calc(var(--strip-h) + var(--pad-b) + 18px);
  z-index:100;
  opacity:0;
  transition: opacity 0.4s, transform 0.6s cubic-bezier(0.76,0,0.24,1);
  pointer-events:none;
}
#meta.visible { opacity:1; }
#meta.hide {
  transform: translateY(calc(var(--strip-h) + var(--pad-b) + 60px));
  opacity:0;
}
#meta .m-studio {
  font-size:1.08rem; color:#fff;
  margin-bottom:6px; line-height:1.4;
  letter-spacing:0.04em;
}
#meta .m-title {
  font-size:1.8rem; color:#fff;
  font-weight:500; line-height:1.3;
  margin-bottom:6px;
}
#meta .m-role {
  font-size:1.08rem; color:#fff;
  line-height:1.4;
}

/* ── SCROLL HINT ── */
#scroll-hint {
  position:fixed;
  right:1.6rem;
  bottom:calc(var(--strip-h) + var(--pad-b) + 18px);
  z-index:100;
  opacity:0;
  transition: opacity 0.4s, transform 0.6s cubic-bezier(0.76,0,0.24,1);
  cursor:default;
  display:flex; align-items:center; gap:12px;
  pointer-events:none;
}
#scroll-hint.visible { opacity:1; pointer-events:all; }
#scroll-hint.hide {
  transform: translateY(calc(var(--strip-h) + var(--pad-b) + 60px));
  opacity:0;
}
#scroll-hint .vid-btn { color:#fff; }
#scroll-hint .vid-btn:hover { color:#fff; opacity:0.6; }
#scroll-hint span { cursor:pointer; }
#scroll-hint span:hover { opacity:0.6; }
#scroll-hint span { font-size:1.8rem; color:#fff; cursor:pointer; font-weight:300; }
#scroll-hint .scroll-arrow { animation:bob 1.8s ease-in-out infinite; cursor:pointer; }
@keyframes bob {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(3px);}
}

/* ── STRIP — fixed, slides down to hide ── */
#strip-area {
  position:fixed;
  left:0; right:0;
  bottom:var(--pad-b);
  height:var(--strip-h);
  z-index:100;
  display:flex;
  transition: transform 0.6s cubic-bezier(0.76,0,0.24,1);
}
#strip-area.hide {
  transform: translateY(calc(100% + var(--pad-b) + 20px));
}

.thumb {
  height:100%;
  flex-shrink:0;
  position:relative;
  cursor:pointer;
  overflow:hidden;
  border-right:1px solid rgba(0,0,0,0.5);
}
.thumb:last-child { border-right:none; }
#strip-area:hover .thumb .thumb-bg { filter:brightness(0.4); }
#strip-area:hover .thumb:hover .thumb-bg { filter:brightness(1); }
.thumb-bg {
  width:100%; height:100%;
  display:flex; /* slices sit side by side */
}
.thumb-slice {
  flex-shrink: 0;
  width: var(--sw, 40px);
  height: 100%;
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center center;
}
.thumb-corners {
  position:absolute; inset:0;
  pointer-events:none; z-index:10;
  opacity:0;
}
.thumb.active .thumb-corners { opacity:1; }
.thumb-corners::before,
.thumb-corners::after,
.thumb-corners .tc-rc::before,
.thumb-corners .tc-rc::after {
  content:'';
  position:absolute;
  width:21px; height:21px;
  border-color:#fff;
  border-style:solid;
}
.thumb-corners::before        { top:0;    left:0;  border-width:2.25px 0 0 2.25px; }
.thumb-corners::after         { top:0;    right:0; border-width:2.25px 2.25px 0 0; }
.thumb-corners .tc-rc::before { bottom:0; left:0;  border-width:0 0 2.25px 2.25px; }
.thumb-corners .tc-rc::after  { bottom:0; right:0; border-width:0 2.25px 2.25px 0; }
.thumb-black {
  position:absolute; inset:0;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index:6;
  pointer-events:none; opacity:0;
  transition: left 0s;
}
.thumb.active .thumb-black { opacity:1; }
.thumb-marker {
  position:absolute; top:0; bottom:0;
  left:0%; width:2px;
  background:#fff; z-index:8;
  pointer-events:none; opacity:0;
}
.thumb.active .thumb-marker { opacity:1; }
.thumb-label {
  position:absolute; bottom:6px; left:7px; right:4px;
  font-size:1.05rem; color:#fff;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  pointer-events:none; z-index:9;
}

/* ── DETAIL PAGE ── */
#detail {
  position:fixed;
  top:100vh; left:0; right:0;
  height:100vh;
  z-index:90;
  overflow:hidden;
  background: transparent;
  transition: top 0.72s cubic-bezier(0.76,0,0.24,1);
}
#detail.open { top:0; }

/* scrollable canvas */
#canvas {
  position:absolute;
  inset:0;
  overflow:hidden;
  cursor:default;
}
#canvas-inner {
  position:relative;
  width:100%;
  height:100%;
}

/* back btn — removed, escape/scroll closes */

/* floating windows */
.win {
  position:absolute;
  cursor:grab;
  user-select:none;
  overflow:hidden;
}
.win:active { cursor:grabbing; }
.win.dragging { z-index:150; }

/* translucent window backgrounds */
.win-video { background:rgba(10,10,10,0.55); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
.win-video video {
  width:100%; height:100%;
  object-fit:cover; display:block;
  pointer-events:none;
}

/* video controls bar — detail video window only */
.vid-controls {
  position:absolute;
  bottom:0; left:0; right:0;
  display:flex; align-items:center; justify-content:flex-end;
  gap:14px; padding:0.6rem 0.9rem;
  background:linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
  opacity:0;
  transition:opacity 0.2s;
  z-index:20;
}

.vid-btn {
  background:none; border:none; cursor:pointer;
  color:#fff; padding:0;
  display:flex; align-items:center; justify-content:center;
  transition:color 0.15s;
}
.vid-btn:hover { color:#fff; opacity:0.6; }
.vid-btn svg { display:block; }
.win-resize {
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:0;
  transition: opacity 0.18s;
  z-index:10;
}
.win:hover .win-resize { opacity:1; }
.win:hover { filter:brightness(0.85); }
.win.dragging, .win.resizing { filter:none; }

/* four corner brackets */
.win-resize::before,
.win-resize::after,
.win-resize .rc::before,
.win-resize .rc::after {
  content:'';
  position:absolute;
  width:21px; height:21px;
  border-color:#fff;
  border-style:solid;
}
.win-resize::before  { top:0;    left:0;  border-width:2.25px 0 0 2.25px; }
.win-resize::after   { top:0;    right:0; border-width:2.25px 2.25px 0 0; }
.win-resize .rc::before { bottom:0; left:0;  border-width:0 0 2.25px 2.25px; }
.win-resize .rc::after  { bottom:0; right:0; border-width:0 2.25px 2.25px 0; }

/* invisible drag zones — one per corner, generous hit area */
.win-resize-drag {
  position:absolute;
  width:48px; height:48px;
  z-index:12;
  pointer-events:all;
}
.win-resize-drag.tl { top:0;    left:0;  cursor:nwse-resize; }
.win-resize-drag.tr { top:0;    right:0; cursor:nesw-resize; }
.win-resize-drag.bl { bottom:0; left:0;  cursor:nesw-resize; }
.win-resize-drag.br { bottom:0; right:0; cursor:nwse-resize; }


/* centered bottom controls on detail video window */
.win-vid-controls {
  position:absolute;
  bottom:14px; left:50%;
  transform:translateX(-50%);
  display:flex; flex-direction:row;
  align-items:center; gap:33px;
  opacity:0; transition:opacity 0.2s;
  z-index:20;
  pointer-events:all;
}
.win-video:hover .win-vid-controls { opacity:1; }
:fullscreen,
:-webkit-full-screen { cursor: auto !important; }
:fullscreen *,
:-webkit-full-screen * { cursor: auto !important; }
body.is-fullscreen,
body.is-fullscreen * { cursor: none !important; }
body.is-fullscreen #cur { display: none !important; }
body.is-fullscreen #cur-fs svg { transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
body.is-fullscreen .win-resize { display: none !important; }
:fullscreen .win-vid-controls,
:-webkit-full-screen .win-vid-controls { opacity:1 !important; }
:fullscreen .win-video video,
:-webkit-full-screen .win-video video { object-fit:contain; }
.win-video video {
  width:100%; height:100%;
  object-fit:cover; display:block;
  pointer-events:none;
}
.win-video-label {
  position:absolute; bottom:0.7rem; left:0.9rem;
  font-size:0.975rem; color:#fff;
  font-family:'NM',sans-serif;
}

.win-text {
  background:rgba(10,10,10,0.55);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  font-family:'NM',sans-serif;
  overflow:hidden;
}
.win-text-inner {
  padding:1.6rem 1.8rem 1.8rem;
  transform-origin: top left;
  white-space: normal;
  word-wrap: break-word;
}
.win-text .wlabel {
  font-size:0.93rem; text-transform:uppercase;
  color:#fff; letter-spacing:0.07em;
  margin-bottom:0.7rem;
}
.win-text .wtitle {
  font-size:2.7rem; font-weight:500;
  color:#fff; line-height:1.1;
  margin-bottom:0.4rem;
}
.win-text .wsub {
  font-size:1.12rem; color:#fff;
  margin-bottom:1.2rem;
}
.win-text .wbody {
  font-size:1.26rem; color:#fff;
  line-height:1.75;
}
.win-text .wrow {
  display:flex; gap:2.5rem; margin-top:1.4rem;
  padding-top:1.2rem;

<script>
// ── PROJECT CONFIG ──
// Add a project: just add its folder name to projects/projects.json
// No HTML changes ever needed.
//
// projects/projects.json format:
//   ["welcome-to-hell", "factmix", "carnet-jove-2025", "bold-campaign-2026"]
//
// Each folder needs:
//   info.txt   video.mp4   01.jpg  02.jpg ...
//
// info.txt format:
//   name: Welcome To Hell
//   client: Black MIDI
//   studio: x
//   type: CG Artist
//   duration: 90
//   color: tc-0
//   about: Description...
//   team: Alex Luque Garcia — CG Artist
//   credits: Studio: x

// Convert Dropbox share URL to direct streaming URL
function fixDropbox(url) {
  if (!url) return null;
  url = url.trim();
  if (url.includes('dropbox.com')) {
    // Replace domain and force raw=1 for direct streaming
    url = url.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
    // Remove any existing dl= or raw= params
    url = url.replace(/[?&]dl=\d/g, '').replace(/[?&]raw=\d/g, '');
    // Clean trailing ? or &
    url = url.replace(/[?&]$/, '');
  }
  return url;
}

function parseInfo(txt) {
  const data = {};
  let key = null;
  txt.split('\n').forEach(line => {
    const m = line.match(/^(\w+):\s*(.*)/);
    if (m) { key = m[1]; data[key] = m[2]; }
    else if (key && line.trim()) { data[key] += '\n' + line.trim(); }
  });
  return data;
}

let projectData    = [];
let projectDetails = [];

// Fallback projects used when projects.json can't be fetched (e.g. local preview)
const FALLBACK_PROJECTS = [
  { folder:'welcome-to-hell',    name:'Welcome To Hell',    client:'Black MIDI',              studio:'x',          type:'CG Artist',                duration:90,  tc:'tc-0', src:'EDIT_black_midi_-WelcomeToHell.mp4' },
  { folder:'factmix',            name:'FactMix',            client:'AhoSsan KMRU',            studio:'x',          type:'CG Artist',                duration:75,  tc:'tc-2', src:'EDIT_black_midi_-WelcomeToHell.mp4' },
  { folder:'carnet-jove-2025',   name:'Carnet Jove 2025',   client:'Generalitat de Catalunya',studio:'Olimpic TV', type:'CG Lead',                  duration:120, tc:'tc-5', src:'EDIT_black_midi_-WelcomeToHell.mp4' },
  { folder:'bold-campaign-2026', name:'BOLD Campaign 2026', client:'Gentle Monster',          studio:'Olimpic TV', type:'VFX Supervisor · CG Lead', duration:60,  tc:'tc-6', src:'EDIT_black_midi_-WelcomeToHell.mp4' },
];
const FALLBACK_DETAILS = [
  { about:'CG work for Black MIDI\'s Welcome To Hell music video.', team:'Alex Luque Garcia — CG Artist', credits:'Studio: x\nDirection: Páraic Mc Gloughlin', images:[] },
  { about:'CG visuals for the FactMix series featuring AhoSsan and KMRU.', team:'Alex Luque Garcia — CG Artist', credits:'Studio: x\nLabel: Fact Magazine', images:[] },
  { about:'CG Lead on the Carnet Jove 2025 campaign for the Generalitat de Catalunya.', team:'Alex Luque Garcia — CG Lead', credits:'Studio: Olimpic TV\nClient: Generalitat de Catalunya', images:[] },
  { about:'VFX Supervisor and CG Lead for the BOLD Campaign 2026 with Gentle Monster.', team:'Alex Luque Garcia — VFX Supervisor · CG Lead', credits:'Studio: Olimpic TV\nClient: Gentle Monster', images:[] },
];

async function loadThumbnailFrames(base) {
  const dir  = `${base}/thumbnail`;
  const exts = ['png','jpg','jpeg','webp'];
  const MAX  = 20;

  // Detect pattern+ext with one request per candidate first frame (parallel, ~16 total)
  const patterns = [
    { name: i => `video_${String(i).padStart(3,'0')}`,    start: 0 },  // video_000.png
    { name: i => `video_${100+i}`,                        start: 0 },  // video_100.png
    { name: i => String(i+1).padStart(2,'0'),             start: 0 },  // 01.png
    { name: i => `frame_${String(i+1).padStart(3,'0')}`,  start: 0 },  // frame_001.png
    { name: i => `frame${String(i+1).padStart(3,'0')}`,   start: 0 },  // frame001.png
  ];

  const firstProbes = patterns.flatMap(p =>
    exts.map(ext => ({ url:`${dir}/${p.name(0)}.${ext}`, p, ext }))
  );

  // Fire all first-frame probes in parallel — just ~16 requests
  const results = await Promise.all(firstProbes.map(async item => {
    try { const r = await fetch(item.url,{method:'HEAD'}); return r.ok ? item : null; }
    catch { return null; }
  }));

  const match = results.find(Boolean);
  if (!match) return { frames: [], total: 0, sliceCount: 0 };

  const nameFn = match.p.name;
  const ext    = match.ext;

  const checkIndices = [9, 19, 29, 39, 59, 99, 149, 199];
  const checkResults = await Promise.all(
    checkIndices.map(async idx => {
      try { const r = await fetch(`${dir}/${nameFn(idx)}.${ext}`,{method:'HEAD'}); return r.ok ? idx : -1; }
      catch { return -1; }
    })
  );

  const lastFound = Math.max(...checkResults);
  let total;
  if (lastFound === -1) {
    total = 1;
    for (let k = 1; k <= 9; k++) {
      try { const r = await fetch(`${dir}/${nameFn(k)}.${ext}`,{method:'HEAD'}); if (r.ok) total = k+1; else break; }
      catch { break; }
    }
  } else {
    const nextCheck = checkIndices[checkIndices.indexOf(lastFound) + 1] ?? lastFound + 1;
    let lo = lastFound, hi = nextCheck;
    while (lo + 1 < hi) {
      const mid = Math.floor((lo + hi) / 2);
      try { const r = await fetch(`${dir}/${nameFn(mid)}.${ext}`,{method:'HEAD'}); if (r.ok) lo = mid; else hi = mid; }
      catch { hi = mid; }
    }
    total = lo + 1;
  }

  const sliceCount = Math.max(4, total);
  const frames = Array.from({length: sliceCount}, (_, i) => {
    const idx = sliceCount === 1 ? 0 : Math.round(i * (total - 1) / (sliceCount - 1));
    return `${dir}/${nameFn(idx)}.${ext}`;
  });

  return { frames, total, sliceCount };
}

// Load images for a project folder.
// If info.txt has an "images:" line listing filenames, use those.
// Otherwise probe 01–09 with multiple extensions.
async function loadImages(base, infoImages) {
  if (infoImages && infoImages.trim()) {
    return infoImages.split(',').map(f => `${base}/${f.trim()}`);
  }
  const exts = ['jpg','png','jpeg','webp'];
  const frames = [];
  for (let n = 1; n <= 9; n++) {
    const pad = String(n).padStart(2,'0');
    for (const ext of exts) {
      try {
        const r = await fetch(`${base}/${pad}.${ext}`, { method:'HEAD' });
        if (r.ok) { frames.push(`${base}/${pad}.${ext}`); break; }
      } catch {}
    }
  }
  return frames;
}

async function loadProjects() {
  const colors = ['tc-0','tc-1','tc-2','tc-3','tc-4','tc-5','tc-6','tc-7'];

  // Try to load projects.json manifest
  let manifest;
  try {
    const res = await fetch('projects/projects.json');
    if (!res.ok) throw new Error('projects.json not found');
    manifest = await res.json();
  } catch(e) {
    console.warn('projects.json not found — using fallback projects');
    projectData    = FALLBACK_PROJECTS;
    projectDetails = FALLBACK_DETAILS;
    return;
  }

  // Load each project's info.txt
  const results = await Promise.all(manifest.map(async (folder, idx) => {
    const base = `projects/${folder}`;
    try {
      const res = await fetch(`${base}/info.txt`);
      if (!res.ok) throw new Error('info.txt missing');
      const txt  = await res.text();
      const info = parseInfo(txt);
      return {
        proj: {
          folder,
          tc:       info.color    || colors[idx % colors.length],
          name:     info.name     || folder,
          client:   info.client   || '',
          studio:   info.studio   || '',
          type:     info.type     || '',
          duration: parseInt(info.duration) || 60,
          src:      fixDropbox(info.video) || `${base}/video.mp4`,
        },
        detail: {
          about:       info.about   || '',
          team:        info.team    || '',
          credits:     info.credits || '',
          imagesHint:  info.images  || '', // used later by background loader
          images:      [],
          thumbFrames: info.frames
            ? info.frames.split(',').map(f => `${base}/thumbnail/${f.trim()}`)
            : [],
          get thumb()  { return this.images[0] || null; }
        }
      };
    } catch(e) {
      return {
        proj:   { folder, tc: colors[idx % colors.length], name: folder, client:'', studio:'', type:'', duration:60, src:`${base}/video.mp4` },
        detail: { about:'', team:'', credits:'', images:[], thumbFrames:[], thumb:null }
      };
    }
  }));

  projectData    = results.map(r => r.proj);
  projectDetails = results.map(r => r.detail);
  console.log('Projects loaded:', projectData.map(p => `${p.name} → ${p.src}`));
}
const SPEED = 6;
let totalDur = 0;

// Build strip thumbs from loaded data
function buildStrip() {
  totalDur = projectData.reduce((s,p) => s + p.duration, 0);
  const minDur = Math.min(...projectData.map(p => p.duration));
  stripEl.innerHTML = '';

  const MIN_SLICES = 4, MAX_SLICES = 20;
  const sliceCounts = projectData.map((p, i) => {
    const sc = projectDetails[i]?.sliceCount;
    if (sc) return sc;
    return Math.round(Math.min(MAX_SLICES, Math.max(MIN_SLICES, (p.duration / minDur) * MIN_SLICES)));
  });

  const totalSlices = sliceCounts.reduce((s, n) => s + n, 0);
  const sliceW = window.innerWidth / totalSlices;
  stripEl.style.setProperty('--sw', sliceW + 'px');

  projectData.forEach((p, i) => {
    const sc = sliceCounts[i];
    const t  = document.createElement('div');
    t.className  = 'thumb';
    t.dataset.i  = i;
    t.style.width = (sc * sliceW) + 'px';

    const frames     = projectDetails[i]?.thumbFrames || [];
    const slicesHTML = buildThumbSlices(frames, p.tc, sc);

    t.innerHTML = `
      <div class="thumb-bg">${slicesHTML}</div>
      <div class="thumb-black"></div>
      <div class="thumb-marker"></div>
      <div class="thumb-corners"><span class="tc-rc"></span></div>
      <div class="thumb-label">${p.name}</div>`;
    t.addEventListener('click', () => { if (!detailOpen) goTo(i); });
    stripEl.appendChild(t);
  });

  // Restore active state and marker after every rebuild
  setActiveThumb(cur);
  setProgress(localProgress);
}

function buildThumbSlices(frames, fallbackTc, sliceCount) {
  const N = sliceCount || 12;
  if (!frames || frames.length === 0) {
    return Array.from({length: N}, (_, i) => {
      const b = 0.7 + (i % 4) * 0.1;
      return `<div class="thumb-slice ${fallbackTc}" style="filter:brightness(${b})"></div>`;
    }).join('');
  }
  // Pick N evenly-spaced frames from the available set
  const picked = Array.from({length: N}, (_, i) => {
    const idx = N === 1 ? 0 : Math.round(i * (frames.length - 1) / (N - 1));
    return frames[Math.min(idx, frames.length - 1)];
  });
  return picked.map(src =>
    `<div class="thumb-slice" style="background-image:url('${src}');background-size:cover;background-position:center center;"></div>`
  ).join('');
}

// Refs
const videoBgInner = document.getElementById('video-bg-inner');
const videoBg      = document.getElementById('video-bg');
const metaEl       = document.getElementById('meta');
const hintEl       = document.getElementById('scroll-hint');
const navEl        = document.querySelector('nav');
const detailEl     = document.getElementById('detail');
const stripEl      = document.getElementById('strip-area');

let cur = 0, localProgress = 0, playing = true;
let lastTs = null, raf = null;
let detailOpen = false;
let transitioning = false;

function allThumbs() { return Array.from(document.getElementById('strip-area').querySelectorAll('.thumb')); }

function setBg(i) {
  const vid = document.getElementById('video-bg-inner');
  if (vid && vid.tagName === 'VIDEO') {
    const srcEl  = vid.querySelector('source');
    const newSrc = projectData[i].src;
    if (srcEl && srcEl.src !== newSrc) {
      srcEl.src = newSrc;
      vid.load();
      vid.play();
    } else {
      vid.currentTime = 0;
      vid.play();
    }
  }
}

function updateMeta(i) {
  const p = projectData[i];
  const studio = (p.studio && p.studio !== 'x') ? p.studio : '';
  const client = (p.client && p.client !== 'x') ? p.client : '';
  const role   = p.type || '';
  const title  = client ? `${p.name} — ${client}` : p.name;
  document.getElementById('m-studio').textContent = studio;
  document.getElementById('m-title').textContent  = title;
  document.getElementById('m-role').textContent   = role;
  metaEl.classList.add('visible');
  hintEl.classList.add('visible'); if(mobControls) mobControls.classList.add('visible');
}

function setActiveThumb(i) {
  allThumbs().forEach((t,j) => t.classList.toggle('active', j===i));
}

function setProgress(lp) {
  localProgress = Math.max(0, Math.min(1, lp));
  const pct = (localProgress * 100).toFixed(3) + '%';
  const at  = allThumbs()[cur];
  if (!at) return;
  at.querySelector('.thumb-marker').style.left = pct;
  const b = at.querySelector('.thumb-black');
  b.style.left = pct; b.style.right = '0'; b.style.width = 'auto';
}

function resetThumb(i) {
  const t = allThumbs()[i];
  if (!t) return;
  t.querySelector('.thumb-marker').style.left = '0%';
  const b = t.querySelector('.thumb-black');
  b.style.left = '0'; b.style.right = '0'; b.style.width = 'auto';
}

// Single source of truth for play/pause state
function setPlaying(val) {
  playing = val;
  if (playing) {
    lastTs = null;
    schedTick();
    if (isLndVideo && lndVideo.paused) lndVideo.play();
    if (lndPlayIcon) lndPlayIcon.innerHTML = '<rect x="1" y="1" width="4" height="12" fill="currentColor"/><rect x="9" y="1" width="4" height="12" fill="currentColor"/>';
    if (mobPlayIcon) mobPlayIcon.innerHTML = '<rect x="1" y="1" width="3.5" height="11" fill="currentColor"/><rect x="8.5" y="1" width="3.5" height="11" fill="currentColor"/>';
  } else {
    cancelAnimationFrame(raf);
    if (isLndVideo && !lndVideo.paused) lndVideo.pause();
    if (lndPlayIcon) lndPlayIcon.innerHTML = '<path d="M1 1L13 7L1 13V1Z" fill="currentColor"/>';
    if (mobPlayIcon) mobPlayIcon.innerHTML = '<path d="M1.5 1L11.5 6.5L1.5 12V1Z" fill="currentColor"/>';
  }
}

function goTo(i) {
  cancelAnimationFrame(raf);
  lastTs = null;
  resetThumb(cur);
  cur = i; localProgress = 0;
  setBg(i);
  setActiveThumb(i);
  updateMeta(i);
  // always resume when switching project — keeps video + marker in sync
  setPlaying(true);
}

function schedTick() { raf = requestAnimationFrame(tick); }
function tick(ts) {
  if (!playing) return;
  if (lastTs === null) lastTs = ts;
  const dt = ts - lastTs; lastTs = ts;
  localProgress += (dt * SPEED) / (projectData[cur].duration * 1000);
  if (localProgress >= 1) { setProgress(1); goTo((cur+1) % projectData.length); return; }
  setProgress(localProgress);
  schedTick();
}

// ── DETAIL — freeform canvas ──
const canvasInner = document.getElementById('canvas-inner');
const canvasEl    = document.getElementById('canvas');

// Fixed aspect ratios per window type
const RATIOS = { video: 16/9, img: 16/9, text: null };

// Window specs — wf = fraction of vw, hf = fraction of vh
function getWinSpecs(p, pd) {
  pd = pd || { about:'', team:'', credits:'', images:[] };
  const imgs = pd.images || [];
  const widths  = [0.26, 0.32, 0.20, 0.30, 0.28, 0.34];
  const imgSpecs = imgs.map((src, i) => ({
    type:'img', wf: widths[i % widths.length], hf:null, ratio:16/9, src
  }));
  return [
    { type:'video', wf:0.40, hf:null,  ratio:16/9 },
    { type:'text',  wf:0.35, hf:0.50,  ratio:null, p, pd },
    ...imgSpecs,
  ];
}

// Grid-based placement — one window per zone, no overlaps, nothing off-screen
function packWindows(specs) {
  const vw  = window.innerWidth;
  const vh  = window.innerHeight;
  const PAD = 20;
  const TOP = 60;
  const BOT = 20;

  const cols = 3;
  const rows = Math.max(2, Math.ceil(specs.length / cols));
  const zw   = Math.floor((vw - PAD * (cols + 1)) / cols);
  const zh   = Math.floor((vh - TOP - BOT - PAD * (rows + 1)) / rows);

  // Build zones row by row
  const zones = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      zones.push({
        zx: PAD + c * (zw + PAD),
        zy: TOP + PAD + r * (zh + PAD),
        zw, zh
      });
    }
  }

  // Shuffle zones so layout feels random each visit
  for (let i = zones.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [zones[i], zones[j]] = [zones[j], zones[i]];
  }

  return specs.map((spec, i) => {
    const zone = zones[i % zones.length];

    // Compute width — capped to zone width
    let w = spec.wf ? Math.round(spec.wf * vw) : Math.round(zone.zw * 0.9);
    w = Math.min(w, zone.zw);

    // Hard max-width for text so it never gets too wide or overflows
    if (spec.type === 'text') w = Math.min(w, Math.round(vw * 0.35));

    // Compute height
    let h = spec.ratio
      ? Math.round(w / spec.ratio)
      : Math.round(spec.hf * vh);

    // Shrink to fit zone height, maintaining ratio
    if (h > zone.zh) {
      h = zone.zh;
      if (spec.ratio) w = Math.min(Math.round(h * spec.ratio), zone.zw);
    }

    // Random offset within zone
    const rx = Math.random() * Math.max(0, zone.zw - w);
    const ry = Math.random() * Math.max(0, zone.zh - h);
    const x  = Math.round(zone.zx + rx);
    const y  = Math.round(zone.zy + ry);

    // Hard clamp — never off-screen
    return {
      x: Math.max(0, Math.min(vw - w, x)),
      y: Math.max(TOP, Math.min(vh - BOT - h, y)),
      w, h, spec
    };
  });
}

      win.innerHTML = `
        <div class="win-text-inner">

          <div class="wbody">${spec.pd.about}</div>

          </div>

    } else {
      win.classList.add('win-img');
      if (spec.src) {
        win.style.backgroundImage = `url('${spec.src}')`;
        win.style.backgroundSize = 'cover';

      } else {
        const ci = projectData.indexOf(p);

    canvasInner.appendChild(win);

    // For text windows: measure natural content size, lock ratio, store for scaling
    if (spec.type === 'text') {
      const inner = win.querySelector('.win-text-inner');
      // Measure natural size with nowrap still active
      const naturalW = inner.scrollWidth;
      const naturalH = inner.scrollHeight;
      // Now allow wrapping for when content is scaled down
      inner.style.whiteSpace = 'normal';
      // Fix inner to its natural width so content never wraps unexpectedly
      inner.style.width  = naturalW + 'px';
      inner.style.height = naturalH + 'px';
      // Set window to natural size
      win.style.width  = naturalW + 'px';
      win.style.height = naturalH + 'px';
      win._ratio    = naturalW / naturalH;
      win._naturalW = naturalW;
      win._naturalH = naturalH;
      inner.style.transform = 'scale(1)';
    }

    makeDraggable(win);
    makeResizable(win);
  });
}

// ── DRAG ──
let topZ = 100;
function makeDraggable(el) {
  let sx, sy, ox, oy, active = false;
  function down(e) {
    if (e.target.closest('.win-resize-drag')) return;
    if (e.target.closest('.vid-btn')) return;
    if (e.target.tagName === 'VIDEO') return;
    active = true;
    el.classList.add('dragging');
    const t = e.touches ? e.touches[0] : e;
    sx = t.clientX; sy = t.clientY;
    ox = parseInt(el.style.left)||0;
    oy = parseInt(el.style.top)||0;
    el.style.zIndex = ++topZ;
    e.preventDefault();
  }
  function move(e) {
    if (!active) return;
    const t = e.touches ? e.touches[0] : e;
    el.style.left = (ox + t.clientX - sx) + 'px';
    el.style.top  = (oy + t.clientY - sy) + 'px';
    e.preventDefault();
  }
  function up() { active = false; el.classList.remove('dragging'); }
  el.addEventListener('mousedown',  down, {passive:false});
  el.addEventListener('touchstart', down, {passive:false});
  window.addEventListener('mousemove', move, {passive:false});
  window.addEventListener('touchmove', move, {passive:false});
  window.addEventListener('mouseup',  up);
  window.addEventListener('touchend', up);
}

// ── RESIZE — four corners, locked aspect ratio for video/img ──
function makeResizable(el) {
  const ratio = el._ratio; // null = free, number = locked

  ['tl','tr','bl','br'].forEach(corner => {
    const handle = el.querySelector('.win-resize-drag.' + corner);
    if (!handle) return;
    let sx, sy, ox, oy, ow, oh, active = false;

    handle.addEventListener('mousedown', e => {
      active = true;
      // Remove max-width constraint on first resize so it can grow freely
      el.style.maxWidth = '';
      sx = e.clientX; sy = e.clientY;
      ox = parseInt(el.style.left) || 0;
      oy = parseInt(el.style.top)  || 0;
      ow = el.offsetWidth;
      oh = el.offsetHeight;
      el.style.zIndex = ++topZ;
      e.stopPropagation(); e.preventDefault();
    });

    window.addEventListener('mousemove', e => {
      if (!active) return;
      const dx = e.clientX - sx;
      const dy = e.clientY - sy;
      let nw = ow, nh = oh, nx = ox, ny = oy;

      if (ratio) {
        // pick dominant axis
        const d = (corner === 'tl' || corner === 'br')
          ? (Math.abs(dx) > Math.abs(dy) ? dx : dy)
          : (Math.abs(dx) > Math.abs(dy) ? dx : -dy);
        const sign = (corner === 'tl' || corner === 'tr') ? -1 : 1;
        const signX = (corner === 'tl' || corner === 'bl') ? -1 : 1;
        nw = Math.max(160, ow + signX * d);
        nh = Math.round(nw / ratio);
        if (corner === 'tl') { nx = ox + (ow - nw); ny = oy + (oh - nh); }
        else if (corner === 'tr') { ny = oy + (oh - nh); }
        else if (corner === 'bl') { nx = ox + (ow - nw); }
      } else {
        // free resize per corner
        if (corner === 'br') {
          nw = Math.max(180, ow + dx); nh = Math.max(100, oh + dy);
        } else if (corner === 'bl') {
          nw = Math.max(180, ow - dx); nh = Math.max(100, oh + dy);
          nx = ox + (ow - nw);
        } else if (corner === 'tr') {
          nw = Math.max(180, ow + dx); nh = Math.max(100, oh - dy);
          ny = oy + (oh - nh);
        } else { // tl
          nw = Math.max(180, ow - dx); nh = Math.max(100, oh - dy);
          nx = ox + (ow - nw); ny = oy + (oh - nh);
        }
      }

      el.style.width  = nw + 'px';
      el.style.height = nh + 'px';
      el.style.left   = nx + 'px';
      el.style.top    = ny + 'px';
      // scale text content proportionally
      const inner = el.querySelector('.win-text-inner');
      if (inner && el._naturalW) {
        const scale = nw / el._naturalW;
        inner.style.transform = `scale(${scale})`;
        inner.style.transformOrigin = 'top left';
      }
    });

    window.addEventListener('mouseup', () => { active = false; });
  });
}

function openDetail() {
  transitioning = true;
  detailOpen = true;
  fillDetail(cur);

  stripEl.classList.add('hide');
  metaEl.classList.add('hide');
  hintEl.classList.add('hide'); if(mobControls) mobControls.classList.add('hide');

  // pause ticker and landing video
  cancelAnimationFrame(raf);
  if (isLndVideo) {
    lndVideo._savedTime = lndVideo.currentTime;
    lndVideo.pause();
  }

  setTimeout(() => {
    videoBg.classList.add('blurred');
    detailEl.classList.add('open');
    detailEl.scrollTop = 0;
  }, 180);

  setTimeout(() => { transitioning = false; }, 900);
}

function closeDetail() {
  if (!detailOpen || transitioning) return;
  transitioning = true;
  detailOpen = false;

  detailEl.classList.remove('open');
  videoBg.classList.remove('blurred');

  // resume landing video and ticker from saved position
  if (isLndVideo && playing) {
    if (lndVideo._savedTime) lndVideo.currentTime = lndVideo._savedTime;
    lndVideo.play();
  }
  if (playing) { lastTs = null; schedTick(); }

  // 2. strip comes back up after detail is gone
  setTimeout(() => {
    stripEl.classList.remove('hide');
    metaEl.classList.remove('hide');
    hintEl.classList.remove('hide'); if(mobControls) mobControls.classList.remove('hide');
    
    metaEl.classList.remove('visible');
    hintEl.classList.remove('visible'); if(mobControls) mobControls.classList.remove('visible');
    setTimeout(() => {
      metaEl.classList.add('visible');
      hintEl.classList.add('visible'); if(mobControls) mobControls.classList.add('visible');
      transitioning = false;
    }, 50);
  }, 500);
}

window.addEventListener('resize', () => { if (projectData.length) buildStrip(); });
window.addEventListener('load', async () => {
  // 1. Load project metadata
  await loadProjects();

  // 2. Preload first video at highest browser priority
  if (projectData[0]?.src) {
    const link = document.createElement('link');
    link.rel = 'preload'; link.as = 'video';
    link.href = projectData[0].src;
    document.head.appendChild(link);
  }

  // 3. Build strip with color fallbacks, start playing
  buildStrip();
  setBg(0); setActiveThumb(0); updateMeta(0); setPlaying(true);

  // 4. First project thumbnails — await so strip fills in immediately
  const firstPd = projectDetails[0];
  if (!firstPd.thumbFrames?.length) {
    const result = await loadThumbnailFrames(`projects/${projectData[0].folder}`);
    if (result.frames.length > 0) {
      firstPd.thumbFrames = result.frames;
      firstPd.sliceCount  = result.sliceCount;
      buildStrip();
    }
  }

  // 5. Remaining thumbnails — all in parallel, non-blocking
  Promise.all(projectData.slice(1).map(async (p, j) => {
    const i  = j + 1;
    const pd = projectDetails[i];
    if (!pd.thumbFrames?.length) {
      const result = await loadThumbnailFrames(`projects/${p.folder}`);
      if (result.frames.length > 0) {
        pd.thumbFrames = result.frames;
        pd.sliceCount  = result.sliceCount;
        buildStrip();
      }
    }
  }));

  // 6. Detail images — lowest priority, not visible on landing
  setTimeout(() => {
    projectData.forEach(async (p, i) => {
      const pd = projectDetails[i];
      if (!pd.images?.length) {
        pd.images = await loadImages(`projects/${p.folder}`, pd.imagesHint);
      }
    });
  }, 2000);
});

async function loadThumbnailsInBackground() {} // no longer used
</script>
</body>
