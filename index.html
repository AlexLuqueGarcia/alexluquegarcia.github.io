<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, shrink-to-fit=yes">
<title>Alex Luque Garcia</title>
<style>
@font-face {
  font-family: 'NM';
  src: url('fonts/NeueMontreal-Light.otf') format('opentype');
  font-weight: 300;
  font-display: swap;
}
@font-face {
  font-family: 'NM';
  src: url('fonts/NeueMontreal-Medium.otf') format('opentype');
  font-weight: 500;
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --strip-h: 100px;
  --pad-b: 14px;
  --dim: rgba(255,255,255,0.38);
  --ease-out: cubic-bezier(0.33, 1, 0.68, 1);
  --ease-smooth: cubic-bezier(0.76, 0, 0.24, 1);
  --ease-spring: cubic-bezier(0.34, 1.2, 0.64, 1);
}
html, body {
  width:100%; height:100%;
  background:#000;
  color:#fff;
  font-family:'NM',sans-serif;
  font-weight:300;
  overflow:hidden;
  cursor:none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-feature-settings: "kern", "liga", "calt";
  font-kerning: normal;
  -webkit-touch-callout: none;
  overscroll-behavior: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
}
/* Initial fade-in on page load — nothing pops in abruptly */
body {
  opacity: 0;
  transition: opacity 0.8s var(--ease-out);
}
body.loaded { opacity: 1; }
/* Block pull-to-refresh on landing elements — only scrollable areas allow pan-y */
#video-bg, #video-bg-peek, #strip-area, nav, #meta, #scroll-hint, #mob-play-indicator {
  touch-action: none;
}
/* Work and detail canvas need to scroll vertically */
#work, #canvas {
  touch-action: pan-y;
  overscroll-behavior: contain;
}
/* Hide scrollbars everywhere while keeping scroll functional */
#work, #canvas, body, html {
  scrollbar-width: none;
  -ms-overflow-style: none;
}
#work::-webkit-scrollbar,
#canvas::-webkit-scrollbar,
body::-webkit-scrollbar,
html::-webkit-scrollbar {
  display: none;
  width: 0;
  height: 0;
}
@media (hover: hover) and (pointer: fine) {
  * { cursor: none !important; }
}

/* Keyboard focus ring — hidden for mouse clicks, visible for Tab navigation.
   Clean subtle outline that respects the design language. */
*:focus { outline: none; }
a:focus-visible, button:focus-visible {
  outline: 1px solid rgba(255,255,255,0.7);
  outline-offset: 3px;
  border-radius: 2px;
}
/* Disable user-select on UI chrome */
nav, #meta, #scroll-hint, #strip-area, .work-row, #detail-footer,
#mob-play-indicator, #cur, .vid-btn, .thumb-label {
  -webkit-user-select:none;
  -moz-user-select:none;
  user-select:none;
}

/* iOS-style tap feedback — all tappable elements get a subtle scale-down
   and brightness drop on active press. The sweet spot is a very small scale
   change with a snappy curve — more than this feels cartoony. */
.nav-links a:active,
#scroll-hint span:active,
#scroll-hint .scroll-arrow:active,
#scroll-hint .vid-btn:active,
.work-row:active,
.df-values a:active,
.info-section .info-body a:active,
#mob-play-indicator:active {
  transform: scale(0.97);
  filter: brightness(0.88);
  transition: transform 0.15s var(--ease-out), filter 0.15s var(--ease-out);
}
/* Windows in detail use a different target (the draggable area) */
.win:active { transition: transform 0.15s var(--ease-out), filter 0.15s var(--ease-out); }

/* ── CUSTOM CURSOR ── */
#cur {
  position:fixed;
  top:0; left:0;
  width:32px; height:32px;
  pointer-events:none;
  z-index:99999;
  transform:translate(-50%,-50%);
  will-change:transform;
}
#cur svg {
  width:100%; height:100%;
  overflow:visible;
  transition: transform 0.3s var(--ease-spring);
}
body.cur-hover #cur svg {
  transform:rotate(45deg);
}

/* ── VIDEO BG — always fixed fullscreen ── */
#video-bg {
  position:fixed;
  inset:0;
  z-index:1;
  background-size:cover;
  background-position:center;
  background-color:#000;
  transition: filter 0.8s var(--ease-out), transform 0.8s var(--ease-out);
  will-change: transform;
}
#video-bg.swiping {
  transition: none;
}
#video-bg.blurred {
  filter: blur(20px);
  transform: scale(1.06);
}
#video-bg-inner {
  width:100%; height:100%;
  background:transparent;
  transition: opacity 0.6s var(--ease-smooth);
  animation: ambientBreath 24s ease-in-out infinite;
  transform-origin: center center;
}
/* Very subtle ambient scale — 1% drift across 24s. Adds filmic aliveness
   without being distracting. Pauses when detail is open (page blurred). */
@keyframes ambientBreath {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.01); }
}
#video-bg.blurred #video-bg-inner { animation: none; }
#video-bg-inner.switching { opacity: 0; }
/* Peek layer — shows next/prev project thumbnail during swipe */
#video-bg-peek {
  position:fixed;
  inset:0;
  z-index:1;
  background-size:cover;
  background-position:center;
  background-color:#000;
  opacity:0;
  will-change: transform;
}
#video-bg-peek.visible { opacity:1; }
#video-bg-peek.swiping { transition: none; }

/* ── INFO SHEET — iPhone-style modal ── */
#info-sheet {
  position: fixed;
  inset: 0;
  z-index: 300;
  pointer-events: none;
}
#info-sheet.open { pointer-events: auto; }

#info-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(12px) saturate(1.2);
  -webkit-backdrop-filter: blur(12px) saturate(1.2);
  opacity: 0;
  transition: opacity 0.5s var(--ease-out);
}
#info-sheet.open #info-backdrop { opacity: 1; }

#info-panel {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -46%) scale(0.92);
  width: min(520px, calc(100vw - 3rem));
  max-height: 80vh;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(30px) saturate(1.4) invert(1) hue-rotate(180deg);
  -webkit-backdrop-filter: blur(30px) saturate(1.4) invert(1) hue-rotate(180deg);
  border-radius: 0;
  padding: 2.2rem 2rem 2rem;
  color: #000;
  font-family: 'NM', sans-serif;
  opacity: 0;
  transition: opacity 0.45s var(--ease-out), transform 0.55s var(--ease-spring);
  box-shadow: 0 30px 80px rgba(0,0,0,0.45), 0 8px 24px rgba(0,0,0,0.3);
  overflow: hidden;
}
/* White corner brackets */
#info-panel::before,
#info-panel::after,
#info-panel .corner-br::before,
#info-panel .corner-br::after {
  content: '';
  position: absolute;
  width: 24px;
  height: 24px;
  border-color: #fff;
  border-style: solid;
  pointer-events: none;
  z-index: 3;
}
#info-panel::before          { top:0;    left:0;  border-width: 2.5px 0 0 2.5px; }
#info-panel::after           { top:0;    right:0; border-width: 2.5px 2.5px 0 0; }
#info-panel .corner-br::before { bottom:0; left:0;  border-width: 0 0 2.5px 2.5px; }
#info-panel .corner-br::after  { bottom:0; right:0; border-width: 0 2.5px 2.5px 0; }
#info-sheet.open #info-panel {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
#info-sheet.open #info-panel {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

#info-close {
  display: none;
}

.info-content {
  display: flex;
  flex-direction: column;
  gap: 1.8rem;
  padding-top: 0.5rem;
}
/* Each section starts slightly offset and faded, then cascades into place
   after the panel itself has settled — classic Apple dialog entrance. */
.info-section {
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.55s var(--ease-out), transform 0.55s var(--ease-out);
}
#info-sheet.open .info-section:nth-child(1) { transition-delay: 0.18s; }
#info-sheet.open .info-section:nth-child(2) { transition-delay: 0.28s; }
#info-sheet.open .info-section:nth-child(3) { transition-delay: 0.38s; }
#info-sheet.open .info-section {
  opacity: 1;
  transform: translateY(0);
}
.info-section .info-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: rgba(0,0,0,0.55);
  margin-bottom: 0.6rem;
  font-weight: 500;
}
.info-section .info-body {
  font-size: 1.1rem;
  line-height: 1.5;
  color: #000;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}
.info-section .info-body a {
  color: #000;
  text-decoration: none;
  transition: opacity 0.25s ease;
  width: fit-content;
}
.info-section .info-body a:hover { opacity: 0.6; }

/* Hero bio — light weight */
.info-bio {
  font-size: 1.55rem;
  line-height: 1.35;
  font-weight: 300;
  letter-spacing: -0.01em;
  color: #000;
}

@media (max-width: 768px) {
  #info-panel {
    width: calc(100vw - 2rem);
    padding: 1.8rem 1.5rem 1.5rem;
  }
  .info-section .info-body { font-size: 1rem; }
  .info-bio { font-size: 1.3rem; }
}

/* ── NAV — fixed, always on top ── */
nav {
  --nav-pad-t: 1.4rem;
  position:fixed;
  top:0; left:0; right:0;
  z-index:100;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding: var(--nav-pad-t) 1.6rem;
  transition: opacity 0.5s ease, transform 0.6s var(--ease-smooth);
}
/* Brand is absolutely centered — doesn't care about side column widths */
.nav-brand {
  position: absolute;
  left: 50%;
  top: var(--nav-pad-t);
  transform: translateX(-50%);
  text-align: center;
}
nav.hide {
  opacity:0;
  transform: translateY(-100%);
}
.nav-links { display:flex; gap:2rem; }
.nav-links a {
  font-size:1.23rem;
  color:#fff; text-decoration:none;
  letter-spacing: -0.005em;
  transition: opacity 0.35s var(--ease-out), transform 0.35s var(--ease-out);
  display: inline-block;
}
.nav-links a:hover { opacity:0.55; }
.nav-links a:active { opacity: 0.4; transform: scale(0.96); }
#nav-year {
  font-size:1.23rem;
  color:#fff;
  font-variant-numeric: tabular-nums;
}
.nav-brand .name {
  font-size:1.23rem; color:#fff;
  display:block; font-weight:500; line-height:1.4;
  letter-spacing: -0.01em;
}
.nav-brand .tagline {
  font-size:1.23rem; color:#fff;
  display:block; margin-top:1px; line-height:1.4;
  letter-spacing: -0.005em;
}

/* ── META — fixed above strip ── */
#meta {
  position:fixed;
  left:1.6rem;
  bottom:calc(var(--strip-h) + var(--pad-b) + 18px);
  z-index:100;
  opacity:0;
  transition: opacity 0.5s ease, transform 0.6s var(--ease-smooth);
  pointer-events:none;
}
#meta.visible { opacity:1; }
#meta.hide {
  transform: translateY(calc(var(--strip-h) + var(--pad-b) + 60px));
  opacity:0;
}
#meta.clickable { pointer-events: auto; cursor: pointer; transition: opacity 0.5s ease, transform 0.6s var(--ease-smooth); }
#meta.clickable:active { opacity: 0.7; }
#meta .m-studio {
  font-size:1.08rem; color:#fff;
  margin-bottom:6px; line-height:1.4;
  letter-spacing:0.04em;
}
#meta .m-title {
  font-size:1.8rem; color:#fff;
  font-weight:500; line-height:1.3;
  margin-bottom:6px;
}
#meta .m-role {
  font-size:1.08rem; color:#fff;
  line-height:1.4;
}

/* ── SCROLL HINT ── */
#scroll-hint {
  position:fixed;
  right:1.6rem;
  bottom:calc(var(--strip-h) + var(--pad-b) + 18px);
  z-index:100;
  opacity:0;
  transition: opacity 0.5s ease, transform 0.6s var(--ease-smooth);
  cursor:default;
  display:flex; align-items:center; gap:12px;
  pointer-events:none;
}
#scroll-hint.visible { opacity:1; pointer-events:all; }
#scroll-hint.hide {
  transform: translateY(calc(var(--strip-h) + var(--pad-b) + 60px));
  opacity:0;
}
#scroll-hint .vid-btn { color:#fff; }
#scroll-hint span { cursor:pointer; transition: opacity 0.25s ease; }
#scroll-hint span:hover { opacity:0.55; }
#scroll-hint span { font-size:1.8rem; color:#fff; cursor:pointer; font-weight:300; }
#scroll-hint .scroll-arrow { animation:bob 2.4s ease-in-out infinite; cursor:pointer; transition: opacity 0.25s ease; }
#scroll-hint .scroll-arrow:hover { opacity:0.55; }
@keyframes bob {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(4px); }
}

/* ── STRIP — fixed, slides down to hide ── */
#strip-area {
  position:fixed;
  left:0; right:0;
  bottom:var(--pad-b);
  height:var(--strip-h);
  z-index:100;
  display:flex;
  transition: transform 0.6s var(--ease-smooth);
}
#strip-area.hide {
  transform: translateY(calc(100% + var(--pad-b) + 20px));
}

.thumb {
  height:100%;
  flex-shrink:0;
  position:relative;
  cursor:pointer;
  overflow:hidden;
}
.thumb:last-child { border-right:none; }

/* First-build entrance cascade — thumbs rise into place one after the other
   with a gentle stagger. JS adds .thumb-enter immediately, then .thumb-entered
   on the next frame to trigger the transition. The --enter-delay variable
   carries each thumb's index-based stagger. */
.thumb-enter {
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.7s var(--ease-out) var(--enter-delay, 0s),
              transform 0.7s var(--ease-out) var(--enter-delay, 0s);
}
.thumb-entered {
  opacity: 1;
  transform: translateY(0);
}

/* Apple-style subtle prominence — the focused thumb gently lifts and brightens,
   others quietly recede */
.thumb {
  transition: transform 0.55s var(--ease-out);
}
.thumb-bg {
  width:100%; height:100%;
  display:flex;
  transition: filter 0.55s var(--ease-out), opacity 0.55s var(--ease-out);
  will-change: filter, opacity;
}
/* Desktop hover behavior */
@media (hover: hover) and (pointer: fine) {
  #strip-area:has(.thumb:hover) .thumb .thumb-bg {
    opacity: 0.75;
    filter: brightness(0.82) saturate(0.9);
  }
  #strip-area:has(.thumb:hover) .thumb:hover .thumb-bg {
    opacity: 1;
    filter: brightness(1.05) saturate(1.05);
  }
}
/* Mobile press behavior */
#strip-area.strip-pressing .thumb .thumb-bg {
  opacity: 0.75;
  filter: brightness(0.82) saturate(0.9);
}
#strip-area.strip-pressing .thumb.pressed .thumb-bg,
#strip-area.strip-pressing .thumb.active .thumb-bg {
  opacity: 1;
  filter: brightness(1.05) saturate(1.05);
}
.thumb-slice {
  flex-shrink: 0;
  width: var(--sw, 40px);
  height: 100%;
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center center;
}
.thumb-corners {
  position:absolute; inset:0;
  pointer-events:none; z-index:10;
  opacity:0;
  transition: opacity 0.35s ease;
}
.thumb.active .thumb-corners { opacity:1; }
.thumb-corners::before,
.thumb-corners::after,
.thumb-corners .tc-rc::before,
.thumb-corners .tc-rc::after {
  content:'';
  position:absolute;
  width:21px; height:21px;
  border-color:#fff;
  border-style:solid;
}
.thumb-corners::before        { top:0;    left:0;  border-width:2.25px 0 0 2.25px; }
.thumb-corners::after         { top:0;    right:0; border-width:2.25px 2.25px 0 0; }
.thumb-corners .tc-rc::before { bottom:0; left:0;  border-width:0 0 2.25px 2.25px; }
.thumb-corners .tc-rc::after  { bottom:0; right:0; border-width:0 2.25px 2.25px 0; }

/* Thinner corners on mobile */
@media (max-width: 768px) {
  .thumb-corners::before,
  .thumb-corners::after,
  .thumb-corners .tc-rc::before,
  .thumb-corners .tc-rc::after {
    width: 14px; height: 14px;
  }
  .thumb-corners::before        { border-width: 1.25px 0 0 1.25px; }
  .thumb-corners::after         { border-width: 1.25px 1.25px 0 0; }
  .thumb-corners .tc-rc::before { border-width: 0 0 1.25px 1.25px; }
  .thumb-corners .tc-rc::after  { border-width: 0 1.25px 1.25px 0; }
}
.thumb-black {
  position:absolute; inset:0;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index:6;
  pointer-events:none; opacity:0;
  transition: opacity 0.35s ease;
}
.thumb.active .thumb-black { opacity:1; }
.thumb-marker {
  position:absolute; top:0; bottom:0;
  left:0%; width:2px;
  background:#fff; z-index:8;
  pointer-events:none; opacity:0;
  transition: opacity 0.35s ease;
}
.thumb.active .thumb-marker { opacity:1; }
.thumb-label {
  position:absolute; bottom:6px; left:7px; right:4px;
  font-size:1.05rem; color:#fff;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  pointer-events:none; z-index:9;
  transition: opacity 0.25s ease;
}
.thumb:hover .thumb-label { opacity: 0.9; }

/* ── DETAIL PAGE ── */
/* ── WORK PAGE ── */
#work {
  position:fixed;
  top:0; left:0; right:0;
  height:100vh;
  height:100svh;
  z-index:91;
  overflow-y:auto;
  overflow-x:hidden;
  background:#000;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.5s var(--ease-out);
  -webkit-overflow-scrolling: touch;
}
#work.open { opacity:1; pointer-events:auto; }
#work-inner {
  min-height:100vh;
  min-height:100svh;
  display:flex;
  flex-direction:column;
}

/* ── YEAR INDICATOR ── 
   Fixed on the right side of the work page, vertically centered.
   Shows the year of whichever project is currently in the viewport's middle.
   The transition between years uses two stacked spans that cross-slide:
   old year eases out with a subtle upward/downward motion + blur,
   new year arrives from the opposite direction. Classic iOS digit-change feel. */
#work-year {
  position: fixed;
  right: 3.2rem;
  top: 50%;
  transform: translateY(-50%);
  z-index: 92;
  pointer-events: none;
  font-family: 'NM', sans-serif;
  font-size: 5.5rem;
  font-weight: 300;
  line-height: 1;
  color: #fff;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  mix-blend-mode: difference;  /* always readable regardless of thumbnail color */
  opacity: 0;
  transition: opacity 0.6s var(--ease-out);
  /* Two slots stacked on top of each other */
  width: 7ch;
  height: 1em;
  text-align: right;
}
#work.open #work-year { opacity: 1; transition-delay: 0.3s; }
#work-year .wy-slot {
  position: absolute;
  right: 0;
  top: 0;
  white-space: nowrap;
  transition:
    opacity 0.45s var(--ease-out),
    transform 0.55s var(--ease-out),
    filter 0.45s var(--ease-out);
  will-change: opacity, transform, filter;
}
/* Default state: current year is visible, incoming is waiting */
#work-year .wy-current {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}
#work-year .wy-incoming {
  opacity: 0;
  /* Starts below — will slide up into place when animating forward */
  transform: translateY(40%);
  filter: blur(6px);
}
/* When scrolling DOWN (next project), current goes up + out, incoming arrives from below */
#work-year.is-changing-forward .wy-current {
  opacity: 0;
  transform: translateY(-40%);
  filter: blur(6px);
}
#work-year.is-changing-forward .wy-incoming {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}
/* When scrolling UP (prev project), current goes down + out, incoming arrives from above */
#work-year.is-changing-backward .wy-current {
  opacity: 0;
  transform: translateY(40%);
  filter: blur(6px);
}
#work-year.is-changing-backward .wy-incoming {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}
/* When NOT animating (after reset), the incoming slot pre-positions without animation */
#work-year.no-anim .wy-slot { transition: none; }

@media (max-width: 768px) {
  #work-year {
    right: 1.2rem;
    font-size: 3rem;
  }
}
.work-row {
  position:relative;
  width:100%;
  flex: 0 0 var(--row-h, 140px);
  overflow:hidden;
  cursor:pointer;
  display:flex;
}
.work-row .work-bg {
  display:flex;
  flex-direction:row;
  width:100%;
  height:100%;
  position:absolute; inset:0;
  transition: filter 0.55s var(--ease-out), opacity 0.55s var(--ease-out);
  will-change: filter, opacity;
}
.work-row .work-slice {
  flex:1;
  height:100%;
  background-size:cover;
  background-position:center;
}
.work-row .work-overlay {
  position:absolute; inset:0;
  display:flex; align-items:center;
  padding:0 2rem;
  pointer-events:none;
  transition: transform 0.4s var(--ease-out);
}
/* Apple-style focus: every row is subtly dimmed by default, and the row
   at the viewport's vertical center (.is-focused) gets the bright treatment.
   On desktop, hovering a specific row overrides the scroll-center focus so
   the cursor always wins when actively used. */
#work-inner:has(.work-row.is-focused) .work-row .work-bg,
#work-inner:has(.work-row:hover) .work-row .work-bg {
  opacity: 0.75;
  filter: brightness(0.82) saturate(0.9);
}
#work-inner:has(.work-row.is-focused) .work-row.is-focused .work-bg {
  opacity: 1;
  filter: brightness(1.05) saturate(1.05);
}
@media (hover: hover) and (pointer: fine) {

// Convert Dropbox share URL to direct streaming URL
function fixDropbox(url) {
  if (!url) return null;
  url = url.trim();
  if (url.includes('dropbox.com')) {
    // Replace domain and force raw=1 for direct streaming
    url = url.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
    // Remove any existing dl= or raw= params
    url = url.replace(/[?&]dl=\d/g, '').replace(/[?&]raw=\d/g, '');
    // Clean trailing ? or &
    url = url.replace(/[?&]$/, '');
  }
  return url;
}

function parseInfo(txt) {
  const data = {};
  let key = null;
  txt.split('\n').forEach(line => {
    const m = line.match(/^(\w+):\s*(.*)/);
    if (m) { key = m[1]; data[key] = m[2]; }
    else if (key && line.trim()) { data[key] += '\n' + line.trim(); }
  });
  return data;
}

// ── ASSET BASE URL ──

async function loadThumbnailFrames(base) {
  const dir  = `${base}/thumbnail`;
  const exts = ['png','jpg','jpeg','webp'];
  const MAX  = 20;

  // Detect pattern+ext with one request per candidate first frame (parallel)
  // Try both 0-indexed and 1-indexed starts
  const patterns = [
    { name: i => `video_${String(i).padStart(3,'0')}`,      start: 0 },  // video_000.png
    { name: i => `video_${String(i+1).padStart(3,'0')}`,    start: 0 },  // video_001.png (ffmpeg default)
    { name: i => `video_${100+i}`,                          start: 0 },  // video_100.png
    { name: i => String(i+1).padStart(2,'0'),               start: 0 },  // 01.png
    { name: i => `frame_${String(i+1).padStart(3,'0')}`,    start: 0 },  // frame_001.png
    { name: i => `frame${String(i+1).padStart(3,'0')}`,     start: 0 },  // frame001.png
  ];

  const firstProbes = patterns.flatMap(p =>
    exts.map(ext => ({ url:`${dir}/${p.name(0)}.${ext}`, p, ext }))
  );

  // Fire all first-frame probes in parallel — just ~16 requests
  const results = await Promise.all(firstProbes.map(async item => {
    try { const r = await fetch(item.url,{method:'HEAD'}); return r.ok ? item : null; }
    catch { return null; }
  }));

  const match = results.find(Boolean);
  if (!match) return { frames: [], total: 0, sliceCount: 0 };

  const nameFn = match.p.name;
  const ext    = match.ext;

  const checkIndices = [9, 19, 29, 39, 59, 99, 149, 199];
  const checkResults = await Promise.all(
    checkIndices.map(async idx => {
      try { const r = await fetch(`${dir}/${nameFn(idx)}.${ext}`,{method:'HEAD'}); return r.ok ? idx : -1; }
      catch { return -1; }
    })
  );

  const lastFound = Math.max(...checkResults);
  let total;
  if (lastFound === -1) {
    total = 1;
    for (let k = 1; k <= 9; k++) {
      try { const r = await fetch(`${dir}/${nameFn(k)}.${ext}`,{method:'HEAD'}); if (r.ok) total = k+1; else break; }
      catch { break; }
    }
  } else {
    const nextCheck = checkIndices[checkIndices.indexOf(lastFound) + 1] ?? lastFound + 1;
    let lo = lastFound, hi = nextCheck;
    while (lo + 1 < hi) {
      const mid = Math.floor((lo + hi) / 2);
      try { const r = await fetch(`${dir}/${nameFn(mid)}.${ext}`,{method:'HEAD'}); if (r.ok) lo = mid; else hi = mid; }
      catch { hi = mid; }
    }
    total = lo + 1;
  }

  const sliceCount = Math.max(4, total);
  const frames = Array.from({length: sliceCount}, (_, i) => {
    const idx = sliceCount === 1 ? 0 : Math.round(i * (total - 1) / (sliceCount - 1));
    return `${dir}/${nameFn(idx)}.${ext}`;
  });

  return { frames, total, sliceCount };
}

// Load images for a project folder.
// If info.txt has an "images:" line listing filenames, use those.
// Otherwise probe 01–09 with multiple extensions.
async function loadImages(base, infoImages) {
  if (infoImages && infoImages.trim()) {
    return infoImages.split(',').map(f => `${base}/${f.trim()}`);
  }
  // Try images.json first — fastest, zero probing
  // Just put ["01.png","02.jpg"] in each project folder on Bunny
  try {
    const r = await fetch(`${base}/images.json`);
    if (r.ok) {
      const list = await r.json();
      return list.map(f => `${base}/${f}`);
    }
  } catch {}
  // Fallback: probe all numbered images in parallel
  const candidates = [];
  for (let n = 1; n <= 20; n++) {
    const pad = String(n).padStart(2, '0');
    for (const ext of ['jpg', 'png', 'webp']) {
      candidates.push({ pad, ext, url: `${base}/${pad}.${ext}` });
    }
  }
  const results = await Promise.all(candidates.map(async c => {
    try { const r = await fetch(c.url, { method: 'HEAD' }); return r.ok ? c : null; }
    catch { return null; }
  }));
  const found = {};
  results.filter(Boolean).forEach(c => { if (!found[c.pad]) found[c.pad] = c.url; });
  return Object.keys(found).sort().map(k => found[k]);
}

async function loadProjects() {
  const colors = ['tc-0','tc-1','tc-2','tc-3','tc-4','tc-5','tc-6','tc-7'];

  // Try to load projects.json manifest
  let manifest;
  try {
    const res = await fetch(PROJECTS_JSON);
    if (!res.ok) throw new Error('projects.json not found');
    manifest = await res.json();
  } catch(e) {
    console.warn('projects.json not found — using fallback projects');
    projectData    = [...FALLBACK_PROJECTS].sort((a, b) => {
      const ya = parseInt(a.folder.match(/^(\d{4})/)?.[1] || '0');
      const yb = parseInt(b.folder.match(/^(\d{4})/)?.[1] || '0');
      return yb - ya;
    });
    projectDetails = projectData.map(p =>
      FALLBACK_DETAILS[FALLBACK_PROJECTS.indexOf(FALLBACK_PROJECTS.find(f => f.folder === p.folder))] || FALLBACK_DETAILS[0]
    );
    return;
  }

  // Load each project's info.txt
  const results = await Promise.all(manifest.map(async (folder, idx) => {
    const mediaBase = `${ASSETS_BASE}/${folder}`;  // Bunny — videos, images, thumbs
    const infoBase  = `projects/${folder}`;         // GitHub — info.txt
    try {
      const res = await fetch(`${infoBase}/info.txt`);
      if (!res.ok) throw new Error('info.txt missing');
      const txt  = await res.text();
      const info = parseInfo(txt);
      // Extract year: prefer info.txt "year:" field, fall back to parsing from
      // the folder name's leading 4-digit number (e.g. "2025-bold" → "2025")
      const folderYear = (folder.match(/^(\d{4})/) || [])[1] || '';
      return {
        proj: {
          folder,
          tc:       info.color    || colors[idx % colors.length],
          name:     info.name     || folder,
          client:   info.client   || '',
          studio:   info.studio   || '',
          type:     info.type     || '',
          year:     info.year     || folderYear,
          duration: parseInt(info.duration) || 60,
          src:      fixDropbox(info.video) || `${mediaBase}/video.mp4`,
        },
        detail: {
          about:       info.about   || '',
          team:        info.team    || '',
          credits:     info.credits || '',
          imagesHint:  info.images  || '',
          images:      [],
          thumbFrames: info.frames
            ? info.frames.split(',').map(f => `${mediaBase}/thumbnail/${f.trim()}`)
            : [],
          get thumb()  { return this.images[0] || null; }
        }
      };
    } catch(e) {
      console.warn(`Failed to load info.txt for ${folder}:`, e);
      const fb = FALLBACK_PROJECTS.find(p => p.folder === folder);
      const folderYear = (folder.match(/^(\d{4})/) || [])[1] || '';
      return {
        proj:   fb || { folder, tc: colors[idx % colors.length], name: folder, client:'', studio:'', type:'', year: folderYear, duration:60, src:`${mediaBase}/video.mp4` },
        detail: { about:'', team:'', credits:'', images:[], thumbFrames:[], thumb:null }
      };
    }
  }));

  projectData    = results.map(r => r.proj);
  projectDetails = results.map(r => r.detail);

  // Sort newest first — extract leading year from folder name (e.g. "2025-bold" → 2025)
  const combined = projectData.map((p, i) => ({ p, d: projectDetails[i] }));
  combined.sort((a, b) => {
    const yearA = parseInt(a.p.folder.match(/^(\d{4})/)?.[1] || '0');
    const yearB = parseInt(b.p.folder.match(/^(\d{4})/)?.[1] || '0');
    return yearB - yearA; // descending — newest left
  });
  projectData    = combined.map(x => x.p);
  projectDetails = combined.map(x => x.d);

  console.log('Projects loaded:', projectData.length);
}

// Build strip thumbs from loaded data
function buildStrip() {
  // Don't rebuild while user is actively scrubbing — it would nuke the DOM element
  // under their finger and break the gesture. Try again shortly.
  if (typeof scrubState !== 'undefined' && scrubState.active) {
    setTimeout(buildStrip, 300);
    return;
  }
  const firstBuild = !stripEl.dataset.built;
  stripEl.dataset.built = '1';
  totalDur = projectData.reduce((s,p) => s + p.duration, 0);
  const minDur = Math.min(...projectData.map(p => p.duration));
  stripEl.innerHTML = '';

  const MIN_SLICES = 4, MAX_SLICES = 20;
  const sliceCounts = projectData.map((p, i) => {
    const sc = projectDetails[i]?.sliceCount;
    if (sc) return sc;
    return Math.round(Math.min(MAX_SLICES, Math.max(MIN_SLICES, (p.duration / minDur) * MIN_SLICES)));
  });

  const totalSlices = sliceCounts.reduce((s, n) => s + n, 0);
  const sliceW = window.innerWidth / totalSlices;
  stripEl.style.setProperty('--sw', sliceW + 'px');

  projectData.forEach((p, i) => {
    const sc = sliceCounts[i];
    const t  = document.createElement('div');
    t.className  = 'thumb';
    t.dataset.i  = i;
    t.style.width = (sc * sliceW) + 'px';

    const frames     = projectDetails[i]?.thumbFrames || [];
    const slicesHTML = buildThumbSlices(frames, p.tc, sc);

    t.innerHTML = `
      <div class="thumb-bg">${slicesHTML}</div>
      <div class="thumb-black"></div>
      <div class="thumb-marker"></div>
      <div class="thumb-corners"><span class="tc-rc"></span></div>
      <div class="thumb-label">${p.name}</div>`;

    // Per-thumb start handlers — window-level move/end listeners are registered once (below)
    const thumbIndex = i;
    t.addEventListener('mousedown', (e) => {
      if (detailOpen) return;
      if (thumbIndex !== cur) return;
      e.preventDefault();
      scrubStart(e.clientX, t);
    });
    t.addEventListener('click', (e) => {
      if (detailOpen) return;
      if (thumbIndex !== cur) { goTo(thumbIndex); return; }
      if (!isTouch && !scrubState.didScrub) {
        const rect = t.getBoundingClientRect();
        seekVideo((e.clientX - rect.left) / rect.width);
      }
    });
    t.addEventListener('touchstart', (e) => {
      // Show the inverted overlay on all other thumbs, clear on this one
      stripEl.classList.add('strip-pressing');
      t.classList.add('pressed');
      if (detailOpen || thumbIndex !== cur) return;
      scrubStart(e.touches[0].clientX, t);
    }, { passive: true });
    t.addEventListener('touchmove', (e) => {
      if (!scrubState.active) return;
      scrubMove(e.touches[0].clientX);
    }, { passive: true });
    t.addEventListener('touchend', () => {
      scrubEnd();
      // Keep overlay visible briefly after release, then fade out
      setTimeout(() => {
        stripEl.classList.remove('strip-pressing');
        t.classList.remove('pressed');
      }, 250);
    }, { passive: true });
    t.addEventListener('touchcancel', () => {
      stripEl.classList.remove('strip-pressing');
      t.classList.remove('pressed');
    }, { passive: true });

    stripEl.appendChild(t);
    if (firstBuild) {
      t.classList.add('thumb-enter');
      // Stagger each thumb's entrance by index * 60ms
      t.style.setProperty('--enter-delay', (i * 0.06) + 's');
    }
  });

  // Restore active state and marker after every rebuild
  setActiveThumb(cur);
  setProgress(localProgress);

  // Trigger the enter animation on first build
  if (firstBuild) {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        stripEl.querySelectorAll('.thumb-enter').forEach(el => el.classList.add('thumb-entered'));
      });
    });
  }
}

function seekVideo(pct) {
  const vid = document.getElementById('video-bg-inner');
  pct = Math.max(0, Math.min(1, pct));
  if (vid && vid.duration && !isNaN(vid.duration)) {
    vid.currentTime = pct * vid.duration;
    localProgress = pct;
    setProgress(pct);
  }
}

// Briefly highlight the current (active) thumb using the same inverted overlay
// system as the press behavior — used after TikTok-style mobile swipe to show
// which thumb the user has landed on.
let _flashTimer = null;
function flashActiveThumb() {
  const thumbs = allThumbs();
  const active = thumbs[cur];
  if (!active) return;
  // Clear any previous flash
  if (_flashTimer) clearTimeout(_flashTimer);
  thumbs.forEach(x => x.classList.remove('pressed'));
  stripEl.classList.add('strip-pressing');
  active.classList.add('pressed');
  _flashTimer = setTimeout(() => {
    stripEl.classList.remove('strip-pressing');
    active.classList.remove('pressed');
    _flashTimer = null;
  }, 350);
}

function buildThumbSlices(frames, fallbackTc, sliceCount) {
  const N = sliceCount || 12;
  if (!frames || frames.length === 0) {
    // No frames loaded yet — show empty slices instead of a gradient placeholder
    return Array.from({length: N}, () => '<div class="thumb-slice"></div>').join('');
  }
  // Pick N evenly-spaced frames from the available set
  const picked = Array.from({length: N}, (_, i) => {
    const idx = N === 1 ? 0 : Math.round(i * (frames.length - 1) / (N - 1));
    return frames[Math.min(idx, frames.length - 1)];
  });
  return picked.map(src =>
    `<div class="thumb-slice" style="background-image:url('${src}');background-size:cover;background-position:center center;"></div>`
  ).join('');
}

let cur = 0, localProgress = 0, playing = true;
let scrubState = { active: false, wasPlaying: false, didScrub: false, targetEl: null, pendingPct: null, lastPreviewAt: 0, token: 0 };
let scrubToken = 0; // Global counter; increments on: scrubStart, project switch, scrubEnd start

function scrubStart(clientX, el) {
  scrubToken++; // Invalidates any in-flight scrubEnd
  scrubState.token = scrubToken; // This scrub owns this token
  scrubState.active = true;
  scrubState.wasPlaying = playing;
  scrubState.didScrub = false;
  scrubState.targetEl = el;
  scrubState.lastPreviewAt = 0;
  setPlaying(false);
  const rect = el.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  scrubState.pendingPct = pct;
  localProgress = pct;
  setProgress(pct);
  previewSeek(pct);
}
function scrubMove(clientX) {
  if (!scrubState.active || !scrubState.targetEl) return;
  scrubState.didScrub = true;
  const rect = scrubState.targetEl.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  scrubState.pendingPct = pct;
  localProgress = pct;
  setProgress(pct);
  const now = performance.now();
  if (now - scrubState.lastPreviewAt > 80) {
    scrubState.lastPreviewAt = now;
    previewSeek(pct);
  }
}
async function scrubEnd() {
  if (!scrubState.active) return;
  scrubState.active = false;
  const wasPlaying = scrubState.wasPlaying;
  const finalPct = scrubState.pendingPct;
  const myToken = scrubState.token; // Token assigned at scrubStart — captured here
  scrubState.targetEl = null;
  scrubState.pendingPct = null;

  const aborted = () => myToken !== scrubToken;

  const vid = document.getElementById('video-bg-inner');
  if (!vid || finalPct == null || !vid.duration || isNaN(vid.duration)) {
    if (wasPlaying && !aborted()) setPlaying(true);
    return;
  }

  // Mobile uses a dedicated HLS-aware bulletproof path; desktop keeps the existing logic
  if (isTouch) {
    return scrubEndMobile(vid, finalPct, wasPlaying, myToken);
  }

  const targetTime = finalPct * vid.duration;

  // Wait for any in-flight preview seeks to settle
  await new Promise(r => requestAnimationFrame(r));
  await new Promise(r => requestAnimationFrame(r));
  if (aborted()) return;

  // Pause and lock state
  if (!vid.paused) vid.pause();

  // Reassert target every poll, until video confirms currentTime matches
  const TIMEOUT = 2500;
  const POLL_INTERVAL = 30;
  const start = performance.now();
  if (aborted()) return;
  vid.currentTime = targetTime;
  while (performance.now() - start < TIMEOUT) {
    await new Promise(r => setTimeout(r, POLL_INTERVAL));
    if (aborted()) return;
    if (!vid.seeking && Math.abs(vid.currentTime - targetTime) < 0.15) {
      break;
    }
    if (!vid.seeking) {
      if (aborted()) return;
      vid.currentTime = targetTime;
    }
  }
  if (aborted()) return;

  vid.currentTime = targetTime;
  localProgress = finalPct;
  setProgress(finalPct);

  await new Promise(r => setTimeout(r, 80));
  if (aborted()) return;

  vid.currentTime = targetTime;

  if (wasPlaying && !aborted()) setPlaying(true);
}

// ── MOBILE-SPECIFIC BULLETPROOF SCRUB RESOLUTION ──
async function scrubEndMobile(vid, finalPct, wasPlaying, myToken) {
  const aborted = () => myToken !== scrubToken;
  const targetTime = finalPct * vid.duration;

  if (aborted()) return;
  localProgress = finalPct;
  setProgress(finalPct);

  if (!vid.paused) vid.pause();

  for (let k = 0; k < 3; k++) {
    await new Promise(r => requestAnimationFrame(r));
    if (aborted()) return;
  }

  const isBuffered = (t) => {
    try {
      for (let i = 0; i < vid.buffered.length; i++) {
        if (t >= vid.buffered.start(i) && t <= vid.buffered.end(i)) return true;
      }
    } catch {}
    return false;
  };

  const requestHlsLoad = (t) => {
    try {
      if (_hlsInstance) _hlsInstance.startLoad(t);
    } catch {}
  };

  if (aborted()) return;
  requestHlsLoad(targetTime);

  const PHASE1_TIMEOUT = 3000;
  const POLL = 40;
  const start = performance.now();
  if (aborted()) return;
  vid.currentTime = targetTime;

  while (performance.now() - start < PHASE1_TIMEOUT) {
    await new Promise(r => setTimeout(r, POLL));
    if (aborted()) return;

    if (!vid.seeking && Math.abs(vid.currentTime - targetTime) < 0.2) {
      break;
    }

    if (!vid.seeking) {
      if (aborted()) return;
      if (isBuffered(targetTime)) {
        vid.currentTime = targetTime;
      } else {
        requestHlsLoad(targetTime);
      }
    }
  }
  if (aborted()) return;

  vid.currentTime = targetTime;
  localProgress = finalPct;
  setProgress(finalPct);

  await new Promise(r => setTimeout(r, 120));
  if (aborted()) return;

  if (Math.abs(vid.currentTime - targetTime) > 0.2) {
    vid.currentTime = targetTime;
    await new Promise(r => setTimeout(r, 80));
    if (aborted()) return;
  }

  if (wasPlaying && !aborted()) {
    setPlaying(true);

    const monitorStart = performance.now();
    const monitorDuration = 600;
    let corrections = 0;
    const MAX_CORRECTIONS = 2;

    while (performance.now() - monitorStart < monitorDuration) {
      await new Promise(r => setTimeout(r, 60));
      if (aborted()) return;
      const elapsed = (performance.now() - monitorStart) / 1000;
      const expected = targetTime + elapsed;
      if (Math.abs(vid.currentTime - expected) > 1.0 && corrections < MAX_CORRECTIONS) {
        if (aborted()) return;
        vid.currentTime = targetTime + (performance.now() - monitorStart) / 1000;
        corrections++;
      }
    }
  }
}

function setBg(i) {
  const vid    = document.getElementById('video-bg-inner');
  const bgEl   = document.getElementById('video-bg');
  if (!vid || vid.tagName !== 'VIDEO') return;
  const newSrc = (projectData[i]?.src || '').trim();
  if (!newSrc) return;
  // Bail if this exact source is already the current one — prevents
  // re-loading HLS stream on accidental re-triggers (keyboard spam, etc.)
  if (vid._currentSrc === newSrc) return;
  vid._currentSrc = newSrc;

  // Use first thumbnail frame as background placeholder — shows instantly, behind video
  const firstThumb = projectDetails[i]?.thumbFrames?.[0];
  if (firstThumb && bgEl) {
    bgEl.style.backgroundImage = `url('${firstThumb}')`;
  }
  if (firstThumb) vid.poster = firstThumb;

  // Fade the video while loading — background thumbnail fills in visually
  vid.classList.add('switching');
  const unfade = () => {
    vid.classList.remove('switching');
    vid.removeEventListener('playing', unfade);
    vid.removeEventListener('canplay', unfade);
  };
  vid.addEventListener('playing', unfade);
  vid.addEventListener('canplay', unfade);

  const isHLS = newSrc.includes('.m3u8');

  // Remove any leftover <source> children — they interfere with hls.js
  while (vid.firstChild) vid.removeChild(vid.firstChild);

  if (isHLS) {
    if (_hlsInstance) { _hlsInstance.destroy(); _hlsInstance = null; }

    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      _hlsInstance = new Hls({ autoStartLoad: true, startLevel: -1 });
      _hlsInstance.loadSource(newSrc);
      _hlsInstance.attachMedia(vid);
      _hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { vid.play().catch(e => console.warn('play:', e)); });
      _hlsInstance.on(Hls.Events.ERROR, (e, d) => console.warn('hls error', d));
    } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
      vid.src = newSrc;
      vid.play().catch(e => console.warn('play:', e));
    } else {
      console.warn('HLS not supported in this browser');
    }
  } else {
    if (_hlsInstance) { _hlsInstance.destroy(); _hlsInstance = null; }
    vid.src = newSrc;
    vid.play().catch(e => console.warn('play:', e));
  }

  // TikTok-style prefetch: after a short delay (letting the current video
  // start playing first), kick off a tiny HEAD/fetch on the next and previous
  // project manifests. Browser caches the m3u8 so when user swipes, HLS.js
  // parses it instantly instead of waiting for the network round-trip.
  clearTimeout(_prefetchTimer);
  _prefetchTimer = setTimeout(() => prefetchAdjacentManifests(i), 1500);
}

let _prefetchTimer = null;
const _prefetchedSrcs = new Set();
function prefetchAdjacentManifests(currentIdx) {
  const n = projectData.length;
  if (n < 2) return;
  const nextIdx = (currentIdx + 1) % n;
  const prevIdx = (currentIdx - 1 + n) % n;
  [nextIdx, prevIdx].forEach(i => {
    const src = (projectData[i]?.src || '').trim();
    if (!src || _prefetchedSrcs.has(src)) return;
    _prefetchedSrcs.add(src);
    // For HLS, fetching the manifest primes the cache. For MP4, we fetch
    // a small Range to warm up connection + first bytes.
    try {
      if (src.includes('.m3u8')) {
        fetch(src, { method: 'GET', mode: 'cors', credentials: 'omit' }).catch(() => {});
      } else {
        fetch(src, { method: 'GET', headers: { Range: 'bytes=0-524288' }, mode: 'cors', credentials: 'omit' }).catch(() => {});
      }
    } catch {}
  });
}

function setActiveThumb(i) {

function setProgress(lp) {
  localProgress = Math.max(0, Math.min(1, lp));
  const pct = (localProgress * 100).toFixed(3) + '%';
  const at  = allThumbs()[cur];
  if (!at) return;

// Single source of truth for play/pause state
function setPlaying(val) {
  playing = val;
  if (playing) {
    lastTs = null;
    schedTick();
    if (isLndVideo && lndVideo.paused) lndVideo.play();
    if (lndPlayIcon) lndPlayIcon.innerHTML = '<rect x="1" y="1" width="4" height="12" fill="currentColor"/><rect x="9" y="1" width="4" height="12" fill="currentColor"/>';
    const ind = mobIndicator;
    if (ind) ind.classList.remove('visible');
  } else {
    cancelAnimationFrame(raf);
    if (isLndVideo && !lndVideo.paused) lndVideo.pause();
    if (lndPlayIcon) lndPlayIcon.innerHTML = '<path d="M1 1L13 7L1 13V1Z" fill="currentColor"/>';
    const ind = mobIndicator;

    if (ind && !workOpen && !detailOpen) ind.classList.add('visible');
  }
}

function goTo(i) {
  scrubToken++; // Abort any in-flight scrubEnd — project is changing
  cancelAnimationFrame(raf);
  lastTs = null;
  resetThumb(cur);
  cur = i; localProgress = 0;
  setBg(i);
  setActiveThumb(i);
  updateMeta(i);
  // always resume when switching project — keeps video + marker in sync
  setPlaying(true);
  haptic('light');
}

// Haptic feedback — subtle tactile response for key interactions.
// Uses the Vibration API, which works on Android/Chrome mobile.
// iOS Safari ignores it (no API exposed) but it's a no-op there — no harm done.
function haptic(kind = 'light') {
  if (!navigator.vibrate) return;
  const patterns = {
    light:  [8],     // tiny tick — project change, tap
    medium: [14],    // click / commit
    heavy:  [22],    // swipe commit, bigger action
    double: [8, 40, 8],  // special moments (e.g. opening work page)
  };
  try { navigator.vibrate(patterns[kind] || patterns.light); } catch {}
}

function schedTick() { raf = requestAnimationFrame(tick); }
function tick(ts) {
  if (!playing) return;
  const vid = document.getElementById('video-bg-inner');
  // While seeking, don't read currentTime — it's stale until the seek completes
  if (vid && vid.seeking) { schedTick(); return; }
  if (vid && vid.duration && !isNaN(vid.duration) && vid.duration > 0) {
    // Drive progress from actual video time
    localProgress = vid.currentTime / vid.duration;
    if (localProgress >= 0.999) {
      setProgress(1);
      goTo((cur + 1) % projectData.length);
      return;
    }
    setProgress(localProgress);
  } else {
    // Fallback: fake timer while video not ready
    if (lastTs === null) lastTs = ts;
    const dt = ts - lastTs; lastTs = ts;
    localProgress += (dt * SPEED) / (projectData[cur].duration * 1000);
    if (localProgress >= 1) { setProgress(1); goTo((cur+1) % projectData.length); return; }
    setProgress(localProgress);
  }
  schedTick();
}

// Mobile detail: pull-down at top follows finger, releases to close or snap back
if (isTouch) {
  let dtlTy0 = 0, dtlActive = false;
  const detailEl_ref = document.getElementById('detail');

  canvasEl.addEventListener('touchstart', e => {
    if (!detailOpen) return;
    dtlTy0 = e.touches[0].clientY;
    dtlActive = false;
  }, { passive: true });

  canvasEl.addEventListener('touchmove', e => {
    if (!detailOpen) return;
    const dy = e.touches[0].clientY - dtlTy0;

    // Only activate when at scroll top AND dragging down
    if (canvasEl.scrollTop <= 0 && dy > 0) {
      if (!dtlActive) {
        dtlActive = true;
        detailEl_ref.style.transition = 'none';
      }
      // Apply a slight resistance so it feels natural
      const resisted = dy * 0.7;
      detailEl_ref.style.transform = `translateY(${resisted}px)`;
    } else if (dtlActive) {
      // User scrolled back up while dragging — cancel
      dtlActive = false;
      detailEl_ref.style.transition = 'transform 0.3s cubic-bezier(0.33,1,0.68,1)';
      detailEl_ref.style.transform = '';
      setTimeout(() => { detailEl_ref.style.transition = ''; }, 300);
    }
  }, { passive: true });

  canvasEl.addEventListener('touchend', e => {
    if (!detailOpen || !dtlActive) return;
    const dy = e.changedTouches[0].clientY - dtlTy0;
    const resisted = dy * 0.7;
    dtlActive = false;

    if (resisted > 120) {
      // Commit — continue sliding down off screen, then close
      const h = window.innerHeight;
      detailEl_ref.style.transition = 'transform 0.35s cubic-bezier(0.33,1,0.68,1)';
      detailEl_ref.style.transform  = `translateY(${h}px)`;
      setTimeout(() => {
        // Reset styles silently and trigger normal close
        detailEl_ref.style.transition = 'none';
        detailEl_ref.style.transform  = '';
        closeDetail();
        // Restore transition after a frame
        requestAnimationFrame(() => { detailEl_ref.style.transition = ''; });
      }, 350);
    } else {
      // Snap back
      detailEl_ref.style.transition = 'transform 0.3s cubic-bezier(0.33,1,0.68,1)';
      detailEl_ref.style.transform  = '';
      setTimeout(() => { detailEl_ref.style.transition = ''; }, 300);
    }
  }, { passive: true });
}

// Fixed aspect ratios per window type
const RATIOS = { video: 16/9, img: 16/9, text: null };

// Window specs — wf = fraction of vw, hf = fraction of vh
function getWinSpecs(p, pd) {
  pd = pd || { about:'', team:'', credits:'', images:[] };
  const imgs = pd.images || [];
  const widths  = [0.26, 0.32, 0.20, 0.30, 0.28, 0.34];
  const imgSpecs = imgs.map((src, i) => ({
    type:'img', wf: widths[i % widths.length], hf:null, ratio:16/9, src
  }));
  return [
    { type:'video', wf:0.40, hf:null,  ratio:16/9 },
    { type:'text',  wf:0.35, hf:0.50,  ratio:null, p, pd },
    ...imgSpecs,
  ];
}

// Grid-based placement — one window per zone, no overlaps, nothing off-screen
function packWindows(specs) {
  const vw  = window.innerWidth;
  const vh  = window.innerHeight;
  const PAD = 20;
  const TOP = 60;
  const BOT = 20;

  const cols = 3;
  const rows = Math.max(2, Math.ceil(specs.length / cols));
  const zw   = Math.floor((vw - PAD * (cols + 1)) / cols);
  const zh   = Math.floor((vh - TOP - BOT - PAD * (rows + 1)) / rows);

  // Build zones row by row
  const zones = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      zones.push({
        zx: PAD + c * (zw + PAD),
        zy: TOP + PAD + r * (zh + PAD),
        zw, zh
      });
    }
  }

  // Shuffle zones so layout feels random each visit
  for (let i = zones.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [zones[i], zones[j]] = [zones[j], zones[i]];
  }

  return specs.map((spec, i) => {
    const zone = zones[i % zones.length];

    // Compute width — capped to zone width
    let w = spec.wf ? Math.round(spec.wf * vw) : Math.round(zone.zw * 0.9);
    w = Math.min(w, zone.zw);

    // Hard max-width for text so it never gets too wide or overflows
    if (spec.type === 'text') w = Math.min(w, Math.round(vw * 0.35));

    // Compute height
    let h = spec.ratio
      ? Math.round(w / spec.ratio)
      : Math.round(spec.hf * vh);

    // Shrink to fit zone height, maintaining ratio
    if (h > zone.zh) {
      h = zone.zh;
      if (spec.ratio) w = Math.min(Math.round(h * spec.ratio), zone.zw);
    }

    // Random offset within zone
    const rx = Math.random() * Math.max(0, zone.zw - w);
    const ry = Math.random() * Math.max(0, zone.zh - h);
    const x  = Math.round(zone.zx + rx);
    const y  = Math.round(zone.zy + ry);

    // Hard clamp — never off-screen
    return {
      x: Math.max(0, Math.min(vw - w, x)),
      y: Math.max(TOP, Math.min(vh - BOT - h, y)),
      w, h, spec
    };
  });
}

// ── DRAG ──
let topZ = 100;
function makeDraggable(el) {
  let sx, sy, ox, oy, active = false;
  function down(e) {
    if (e.target.closest('.win-resize-drag')) return;
    if (e.target.closest('.vid-btn')) return;
    if (e.target.tagName === 'VIDEO') return;
    active = true;
    el.classList.add('dragging');
    const t = e.touches ? e.touches[0] : e;
    sx = t.clientX; sy = t.clientY;
    ox = parseInt(el.style.left)||0;
    oy = parseInt(el.style.top)||0;
    el.style.zIndex = ++topZ;
    e.preventDefault();
  }
  function move(e) {
    if (!active) return;
    const t = e.touches ? e.touches[0] : e;
    el.style.left = (ox + t.clientX - sx) + 'px';
    el.style.top  = (oy + t.clientY - sy) + 'px';
    e.preventDefault();
  }
  function up() { active = false; el.classList.remove('dragging'); }
  el.addEventListener('mousedown',  down, {passive:false});
  el.addEventListener('touchstart', down, {passive:false});
  window.addEventListener('mousemove', move, {passive:false});
  window.addEventListener('touchmove', move, {passive:false});
  window.addEventListener('mouseup',  up);
  window.addEventListener('touchend', up);
}

// ── RESIZE — four corners, locked aspect ratio for video/img ──
function makeResizable(el) {
  const ratio = el._ratio; // null = free, number = locked

  ['tl','tr','bl','br'].forEach(corner => {
    const handle = el.querySelector('.win-resize-drag.' + corner);
    if (!handle) return;
    let sx, sy, ox, oy, ow, oh, active = false;

    handle.addEventListener('mousedown', e => {
      active = true;
      // Remove max-width constraint on first resize so it can grow freely
      el.style.maxWidth = '';
      sx = e.clientX; sy = e.clientY;
      ox = parseInt(el.style.left) || 0;
      oy = parseInt(el.style.top)  || 0;
      ow = el.offsetWidth;
      oh = el.offsetHeight;
      el.style.zIndex = ++topZ;
      e.stopPropagation(); e.preventDefault();
    });

    window.addEventListener('mousemove', e => {
      if (!active) return;
      const dx = e.clientX - sx;
      const dy = e.clientY - sy;
      let nw = ow, nh = oh, nx = ox, ny = oy;

      if (ratio) {
        // pick dominant axis
        const d = (corner === 'tl' || corner === 'br')
          ? (Math.abs(dx) > Math.abs(dy) ? dx : dy)
          : (Math.abs(dx) > Math.abs(dy) ? dx : -dy);
        const sign = (corner === 'tl' || corner === 'tr') ? -1 : 1;
        const signX = (corner === 'tl' || corner === 'bl') ? -1 : 1;
        nw = Math.max(160, ow + signX * d);
        nh = Math.round(nw / ratio);
        if (corner === 'tl') { nx = ox + (ow - nw); ny = oy + (oh - nh); }
        else if (corner === 'tr') { ny = oy + (oh - nh); }
        else if (corner === 'bl') { nx = ox + (ow - nw); }
      } else {
        // free resize per corner
        if (corner === 'br') {
          nw = Math.max(180, ow + dx); nh = Math.max(100, oh + dy);
        } else if (corner === 'bl') {
          nw = Math.max(180, ow - dx); nh = Math.max(100, oh + dy);
          nx = ox + (ow - nw);
        } else if (corner === 'tr') {
          nw = Math.max(180, ow + dx); nh = Math.max(100, oh - dy);
          ny = oy + (oh - nh);
        } else { // tl
          nw = Math.max(180, ow - dx); nh = Math.max(100, oh - dy);
          nx = ox + (ow - nw); ny = oy + (oh - nh);
        }
      }

      el.style.width  = nw + 'px';
      el.style.height = nh + 'px';
      el.style.left   = nx + 'px';
      el.style.top    = ny + 'px';
      // scale text content proportionally
      const inner = el.querySelector('.win-text-inner');
      if (inner && el._naturalW) {
        const scale = nw / el._naturalW;
        inner.style.transform = `scale(${scale})`;
        inner.style.transformOrigin = 'top left';
      }
    });

    window.addEventListener('mouseup', () => { active = false; });
  });
}

function fillDetail(i) {
  if (isTouch) {
    buildMobileDetail(projectData[i], projectDetails[i]);
  } else {
    buildWindows(projectData[i], projectDetails[i]);

}

function buildMobileDetail(p, pd) {
  canvasInner.innerHTML = '';
  canvasInner.classList.add('mobile-detail');

  const studio = (p.studio && p.studio !== 'x') ? p.studio : '';
  const client = (p.client && p.client !== 'x') ? p.client : '';
  const title  = client ? `${p.name} — ${client}` : p.name;
  const teamLines   = (pd?.team || '').replace(/\n/g, '<br>');
  const creditLines = (pd?.credits || '').replace(/\n/g, '<br>');

  // 1. Text block (no window bg)
  const textBlock = document.createElement('div');
  textBlock.className = 'mobile-detail-text';
  textBlock.innerHTML = `
    ${studio ? `<div class="md-studio">${studio}</div>` : ''}
    <div class="md-title">${title}</div>
    ${p.type ? `<div class="md-role">${p.type}</div>` : ''}
    ${pd?.about ? `<div class="md-about">${pd.about}</div>` : ''}
    ${pd?.team ? `<div class="md-section"><div class="md-label">TEAM</div><div class="md-body">${teamLines}</div></div>` : ''}
    ${pd?.credits ? `<div class="md-section"><div class="md-label">CREDITS</div><div class="md-body">${creditLines}</div></div>` : ''}
  `;
  canvasInner.appendChild(textBlock);

  // 2. Video
  const videoBlock = document.createElement('div');
  videoBlock.className = 'mobile-detail-video';
  videoBlock.innerHTML = `
    <video autoplay muted loop playsinline crossorigin="anonymous" controls style="width:100%;display:block;"></video>
  `;
  canvasInner.appendChild(videoBlock);

  const vid = videoBlock.querySelector('video');
  const src = p.src || '';
  const isHLS = src.includes('.m3u8');
  if (isHLS && typeof Hls !== 'undefined' && Hls.isSupported()) {
    const h = new Hls({ autoStartLoad: true, startLevel: -1 });
    h.loadSource(src); h.attachMedia(vid);
  } else if (src) {
    vid.src = src;
  }
  if (pd?.thumbFrames?.[0]) vid.poster = pd.thumbFrames[0];

  // 3. Images stacked
  (pd?.images || []).forEach(imgSrc => {
    const imgBlock = document.createElement('div');
    imgBlock.className = 'mobile-detail-img';
    imgBlock.innerHTML = `<img src="${imgSrc}" style="width:100%;display:block;" loading="lazy">`;
    canvasInner.appendChild(imgBlock);
  });
}
